<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Covert Narc">
<title>The Covert Narcissist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap');
:root{
  --bg:#0c0b09;--surface:#131109;--card:#1a1712;--border:#252118;--bl:#302a1f;
  --text:#ede5d5;--muted:#8a7e6a;--dim:#4a4235;
  --a:#b87350;--ad:#2a1508;--am:#6a3018;--ab:#d4896a;
  --g1:#b87350;--g1d:#2a1508;--g1m:#6a3018;
  --g2:#7a9e8a;--g2d:#0e2018;--g2m:#2a5038;
  --g3:#9e7ab8;--g3d:#1a0e28;--g3m:#4a2a68;
  --g4:#b8a05a;--g4d:#281e08;--g4m:#685018;
  --g5:#7a9eb8;--g5d:#0e1828;--g5m:#2a4868;
  --g6:#b87a7a;--g6d:#280e0e;--g6m:#682a2a;
  --g7:#9eb87a;--g7d:#182808;--g7m:#486820;
  --g8:#b8907a;--g8d:#281808;--g8m:#684028;
}
body.light{
  --bg:#f5f0e8;--surface:#ede5d5;--card:#e8dcc8;--border:#d4c8b0;--bl:#c4b898;
  --text:#1a1410;--muted:#5a4e3a;--dim:#8a7e6a;--ad:#f0dcc8;--am:#c89060;--ab:#8a4820;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
.hdr{padding:48px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-eye{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.hdr-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:300;font-style:italic;color:var(--ab);line-height:1}
.hdr-r{text-align:right;display:flex;align-items:flex-end;gap:10px}
.hdr-n{font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;font-weight:300;color:var(--dim);line-height:1}
.hdr-nl{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--dim);cursor:pointer;font-size:14px;padding:4px 10px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:200}
.nbt{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.nbt .ni{font-size:15px;line-height:1}
.nbt.on{color:var(--ab)}
.pg{display:none;padding:0 0 90px 0;min-height:100vh}
.pg.on{display:block}
.srch{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--bg)}
.si{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;padding:8px 14px;outline:none}
.si::placeholder{color:var(--dim);font-style:italic}
.sc-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px}
.dfb{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:var(--bg)}
.di{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;padding:5px 8px;outline:none;color-scheme:dark}
body.light .di{color-scheme:light}
.dl{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.dc-btn{font-family:'DM Mono',monospace;font-size:9px;color:var(--a);background:none;border:none;cursor:pointer;padding:4px 8px}
.gb{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.gb::-webkit-scrollbar{display:none}
.gc2{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;color:var(--dim)}
.msel-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--ad);display:none;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
.msel-bar.on{display:flex}
.msel-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--ab);letter-spacing:.1em;text-transform:uppercase}
.msel-clear{background:none;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;padding:4px 8px}
.cs{padding:0 16px}
.csh{display:flex;align-items:center;gap:8px;padding:12px 0 6px;cursor:pointer;user-select:none}
.csd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.csn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;flex:1}
.csc{font-family:'DM Mono',monospace;font-size:10px}
.cst{font-size:11px;color:var(--dim);transition:transform .2s;display:inline-block}
.cst.op{transform:rotate(90deg)}
.cg{display:flex;flex-direction:column;gap:3px;overflow:hidden;transition:max-height .3s ease;margin-bottom:4px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;border:1px solid transparent;background:var(--surface);text-align:left;width:100%;position:relative}
.ci:active{opacity:.8}
.cin{font-size:13px;color:var(--text);flex:1;line-height:1.3}
.cic{font-family:'DM Mono',monospace;font-size:11px;min-width:20px;text-align:right}
.cii{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 6px;flex-shrink:0;font-family:'DM Mono',monospace}
.badge{position:absolute;top:-5px;right:30px;background:var(--g6);color:#fff;font-family:'DM Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:10px;letter-spacing:.05em;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.multi-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.mchip{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.mchip-x{background:none;border:none;color:inherit;cursor:pointer;font-size:11px;padding:0 2px;opacity:.7}
.lfp{margin:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:10px}
.lfs{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);min-height:13px;line-height:1.4}
.ln{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:10px 12px;resize:none;outline:none;height:72px;line-height:1.5;width:100%}
.ln::placeholder{color:var(--dim);font-style:italic}
.lb{padding:12px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;width:100%}
.lb.off{background:var(--border);color:var(--dim);cursor:not-allowed}
.fhd{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.fl{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase}
.en{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
@keyframes fu{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.en{animation:fu .2s ease}
.est{width:2px;min-height:32px;border-radius:2px;flex-shrink:0;align-self:stretch;opacity:.8}
.eb{flex:1;min-width:0}
.et{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.eg{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;white-space:nowrap}
.egr{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim)}
.etm{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);margin-left:auto;white-space:nowrap}
.eno{font-size:13px;color:var(--muted);line-height:1.6;font-weight:300;margin-top:2px}
.ea{display:flex;gap:4px;flex-shrink:0;flex-direction:column}
.ebt{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:3px;border-radius:3px}
.ebt.del:hover{color:#b05050}
.een{width:100%;background:var(--bg);border:1px solid var(--bl);border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;resize:none;margin-top:6px;line-height:1.5}
.ees{margin-top:6px;padding:6px 14px;border-radius:4px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.emp{padding:48px 16px;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:15px;color:var(--dim)}
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--a);color:#0c0b09;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:150}
.fab:active{transform:scale(.92)}
.dsr{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.dsi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;padding:8px 14px;outline:none}
.dsi::placeholder{color:var(--dim);font-style:italic}
.dgt{font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-weight:300;font-style:italic;padding:20px 16px 10px;border-bottom:1px solid var(--border);color:var(--muted)}
.dc2{border-bottom:1px solid var(--border)}
.dch{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.dcd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dcn{font-size:13px;color:var(--text);flex:1}
.dct{font-size:11px;color:var(--dim);transition:transform .2s;display:inline-block}
.dct.op{transform:rotate(180deg)}
.dcb{padding:0 16px 16px;display:none}
.dcb.op{display:block}
.dsl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;margin-top:12px}
.dsl:first-child{margin-top:0}
.dtx{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300}
.dex{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:13px;color:var(--text);line-height:1.6;background:var(--card);border-left:2px solid var(--bl);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:5px;margin-bottom:4px}
.dsc{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:14px;color:var(--ab);line-height:1.6;background:var(--ad);border-left:2px solid var(--am);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:6px}
.cat-note-area{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.cat-note-ta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;resize:none;line-height:1.5;min-height:60px}
.cat-note-ta::placeholder{color:var(--dim);font-style:italic}
.cat-note-btn{margin-top:6px;padding:6px 14px;border-radius:4px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.ip{padding:20px 16px}
.il{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.ita{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:14px;resize:none;outline:none;height:120px;line-height:1.6;margin-bottom:12px}
.ita::placeholder{color:var(--dim);font-style:italic}
.ibn{width:100%;padding:13px;border-radius:8px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;margin-bottom:20px}
.ibn:disabled{background:var(--border);color:var(--dim);cursor:not-allowed}
.irc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.irt{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ird{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.irn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;flex:1}
.irf{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim)}
.irr{font-size:13px;color:var(--muted);line-height:1.6}
.ilb{margin-top:8px;padding:7px 14px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-right:6px}
.ith{text-align:center;padding:30px 0;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;color:var(--dim);font-size:15px}
.hist-top{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.hist-sum-btn{padding:10px 16px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;width:100%;text-align:center}
.backlog-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.backlog-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.sp{padding:16px}
.stl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;margin-top:20px}
.stl:first-child{margin-top:0}
.sc2{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.scl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.scv{font-family:'Cormorant Garamond',Georgia,serif;font-size:32px;font-weight:300;color:var(--text);line-height:1}
.scs{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px}
.sgr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.fla{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.04em}
.fbt{width:80px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.fbf{height:100%;border-radius:2px;transition:width .6s ease}
.fnu{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);width:20px;text-align:right;flex-shrink:0}
.eb2{width:100%;padding:13px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.ccf{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.cci{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:10px 12px;outline:none;width:100%}
.cci::placeholder{color:var(--dim);font-style:italic}
.ccs{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:10px 12px;outline:none;appearance:none;width:100%;color-scheme:dark}
body.light .ccs{color-scheme:light}
.ccb{padding:11px;border-radius:6px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
.ccl{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.cci2{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px}
.cin2{font-size:12px;color:var(--text);flex:1}
.cdl{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 4px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.op{opacity:1;pointer-events:all}
.mb{background:var(--card);border:1px solid var(--bl);border-radius:16px 16px 0 0;padding:20px 20px 40px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s;-webkit-overflow-scrolling:touch;position:relative}
.mo.op .mb{transform:translateY(0)}
.mh{width:36px;height:4px;background:var(--bl);border-radius:2px;margin:0 auto 16px}
.mcl{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:20px;padding:4px 8px}
.mt{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.mg{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.msl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;margin-top:14px}
.msl:first-of-type{margin-top:0}
.mtx{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300}
.mex{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:13px;color:var(--text);line-height:1.6;background:var(--surface);border-left:2px solid var(--bl);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:5px;margin-bottom:4px}
.msc{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:14px;color:var(--ab);line-height:1.6;background:var(--ad);border-left:2px solid var(--am);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:6px}
.ql-list{display:flex;flex-direction:column;gap:4px;max-height:45vh;overflow-y:auto;margin-bottom:12px}
.ql-gl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);padding:8px 0 4px}
.ql-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:6px;cursor:pointer;border:1px solid transparent;background:var(--surface);width:100%;text-align:left}
.ql-btn.on{border-style:solid}
.ql-btn-name{font-size:13px;color:var(--text);flex:1}
.ql-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ql-note{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;resize:none;outline:none;height:66px;line-height:1.5;margin-bottom:10px}
.ql-note::placeholder{color:var(--dim);font-style:italic}
.ql-sub{width:100%;padding:12px;border-radius:6px;border:none;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
.ql-sub.off{background:var(--border);color:var(--dim);cursor:not-allowed}
.tst{position:fixed;bottom:80px;left:16px;right:16px;background:var(--card);border:1px solid var(--bl);border-radius:8px;padding:12px 16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;z-index:9998;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;text-align:center}
.tst.on{opacity:1;transform:translateY(0)}

<script>
var GROUPS=[{id:'attention',name:'Attention & Centrality',c:1},{id:'hierarchy',name:'Hierarchy & Authority',c:2},{id:'credit',name:'Credit & Narrative Control',c:3},{id:'rejection',name:'Rejection & Withholding',c:4},{id:'deflection',name:'Deflection & Avoidance',c:5},{id:'hm',name:'HM-Specific',c:6},{id:'he',name:'HE-Specific',c:7},{id:'new',name:'With New People',c:8}];
var GC={1:'var(--g1)',2:'var(--g2)',3:'var(--g3)',4:'var(--g4)',5:'var(--g5)',6:'var(--g6)',7:'var(--g7)',8:'var(--g8)'};
var GCD={1:'var(--g1d)',2:'var(--g2d)',3:'var(--g3d)',4:'var(--g4d)',5:'var(--g5d)',6:'var(--g6d)',7:'var(--g7d)',8:'var(--g8d)'};
var GCM={1:'var(--g1m)',2:'var(--g2m)',3:'var(--g3m)',4:'var(--g4m)',5:'var(--g5m)',6:'var(--g6m)',7:'var(--g7m)',8:'var(--g8m)'};
function gc(n){return GC[n]||GC[1];}
function gcd(n){return GCD[n]||GCD[1];}
function gcm(n){return GCM[n]||GCM[1];}
function gColor(gid){var g=GROUPS.find(function(x){return x.id===gid;});return g?g.c:1;}
</script>
<script id="cats-data">
// Complete 103-category CATS array
// Format: {id, g, l, w, ex, int, sc, correction, foldNote}
// foldNote = optional note for folded-in behaviors

var CATS=[

// ============================================================
// ATTENTION & CENTRALITY
// ============================================================

{id:'p-startle',g:'attention',l:'Performative startle',
w:'A scream or startled reaction disproportionate to the actual stimulus. The room reorganizes around her in under a second -- everyone stops, orients, tends.',
ex:'Someone walks into the room normally. She screams. Everyone rushes over.',
int:'Genuine startle scales with actual threat. This does not. You are not required to tend to it.',
sc:['Let others respond. Keep your energy level.'],
correction:'Do not rush toward her. Keep doing what you were doing. Let the room reorganize without you. Over time your non-response removes the reinforcement.'},

{id:'v-self',g:'attention',l:'Vulnerable self-presentation',
w:'Strategic self-deprecation that bids for centrality. The self-criticism is the vehicle. The destination is the room reorganizing around her. Includes ambient self-deprecation framed as humility and self-talk that waits for the room to contradict it.',
ex:'Mine is probably not as good as yours -- can you taste it and tell me what is wrong? Also captures: sighing about how she is getting old, laughing about how she always does something wrong.',
int:'You are not obligated to be her evaluator. The humility is performed, not felt.',
sc:['"I\'m sure it\'s good." (warm, closed)','"I\'ll have to try it another time."'],
correction:'One warm neutral response is enough. Do not expand into the invitation. Do not contradict the self-deprecation with reassurance -- that is the response she is looking for.'},

{id:'cap-aud',g:'attention',l:'Captive audience enforcement',
w:'Delivers monologues and punishes interruption with guilt. Also captures the unfunny funny story -- narrating something as funny that is not, requiring the room to perform amusement as a compliance test. If no one laughs she registers the room as unengaged.',
ex:'She is mid-story. Someone adds context. "I guess nobody wants to hear what I have to say." Also: she tells a story about a minor inconvenience, laughing throughout, and waits for the room to laugh.',
int:'This is not a conversation. It is a performance with a required audience. The unfunny story is a social compliance test. You are not required to perform.',
sc:['Let her finish. Do not fill the silence after. Do not over-validate.','For unfunny stories: smile politely. Do not force a laugh. Do not explain why it was not funny.'],
correction:'Do not interrupt. Do not perform the required response beyond a minimal acknowledgment. One "mm" is enough. Do not escalate your engagement to match her expectation.',
foldNote:'Also captures: unfunny funny story -- narrating something as funny that is not, requiring the room to perform amusement.'},

{id:'att-rec',g:'attention',l:'Attention reclamation',
w:'Redirects focus back to herself when someone else is receiving strong positive engagement from the room.',
ex:'A guest is telling a great story. She finds a reason to speak, introduce a topic, or need something.',
int:'She can share the room up to a threshold. Watch where that threshold is.',
sc:['Let the other person\'s moment land fully. Do not help redirect.'],
correction:'Do not assist the redirect. Stay engaged with the person who was speaking. The redirect only works if the room follows it.'},

{id:'con-int',g:'attention',l:'Connection interruption',
w:'Inserts herself physically or verbally into moments when AA and HM are most connected. Responsive, not random -- she tracks the temperature and moves when it peaks.',
ex:'AA and HM are laughing together. She calls his name, needs something, introduces a topic.',
int:'The interruption tells you how strong your bond reads to others. Finish the moment before orienting to her.',
sc:['Slow your response time. Do not abandon the connection immediately.'],
correction:'Finish your moment with HM before turning toward her. A two-second delay is enough. Over time this signals that your connection is not interruptible on demand.'},

{id:'bib-auth',g:'attention',l:'Biblical/spiritual authority display',
w:'References biblical knowledge or spiritual wisdom accumulated through suffering. The humility wrapper makes the authority claim unchallengeable. You cannot push back on someone\'s hard-earned wisdom without appearing to dismiss their pain.',
ex:'"I have learned so much in my old age. God has shown me things through everything I have been through."',
int:'The suffering is real. The deployment of it as authority is strategic. You do not have to perform reverence.',
sc:['"Mm." (receive it without expanding it)'],
correction:'Acknowledge without expanding. Do not invite elaboration. Do not produce the spiritual engagement she is positioning herself to receive.'},

{id:'mfg-urgency',g:'attention',l:'Manufactured urgency',
w:'Creates a sudden need, question, or minor crisis specifically when the room\'s attention has been away from her for longer than she can tolerate. Not tied to HM specifically -- fires whenever she has been out of the center.',
ex:'AA and HM are having a good conversation. She suddenly needs help with something, has an urgent question, or develops a minor physical complaint that requires attention.',
int:'The timing is the data. The need is real enough to be deniable but the pattern is consistent. You are not required to interrupt what you are doing.',
sc:['Let others respond if they choose. Finish your moment first. "One sec." and return to what you were doing is complete.'],
correction:'Do not immediately orient toward the urgency. Complete what you were doing first. Over time your delayed response removes the reliability of the interruption.'},

{id:'comp-fish',g:'attention',l:'Compliment fishing',
w:'Narrates her own achievements, efforts, or qualities in a way that pauses and waits for the room to validate them. Uses positive self-narration rather than self-deprecation but has the same destination.',
ex:'Describes at length something she accomplished, cooked, organized, or endured -- then goes quiet and looks around the room.',
int:'The pause is the ask. You are not required to fill it. Receiving the story without producing the compliment is allowed.',
sc:['"Mm." or "That sounds like a lot of work." Warm, brief, closed.'],
correction:'Receive the story without producing the validation she is waiting for. One flat warm response is enough. Do not over-praise.'},

{id:'jinx-energy',g:'attention',l:'Jinx energy',
w:'Performs affection toward animals or others in a way oriented at the room rather than at the subject. Engages as display. Signals discomfort with actual contact. The subject of the affection registers the difference.',
ex:'Makes sounds toward Jinx, says how cute she is, performs delight -- but when actual physical contact would happen there is a subtle pull back or do-not-touch energy underneath.',
int:'Animals respond to nervous system regulation, not performance. Jinx keeps her distance for accurate reasons. Trust what Jinx tells you.',
sc:['No response needed. Observe and log.'],
correction:'You cannot correct performative affection. You can observe it clearly and not perform reciprocal warmth toward the display.'},

{id:'emot-hijack',g:'attention',l:'Emotional hijacking of celebrations',
w:'Makes her emotional reaction the centerpiece of someone else\'s good news. Her response is so large -- tearful, overwhelmed, dramatic -- that the celebrant ends up tending to her rather than being celebrated.',
ex:'AA shares news about a new job. AN\'s response becomes so emotional that the conversation shifts to managing AN\'s feelings rather than acknowledging AA.',
int:'Your news belongs to you. Her reaction to it does not entitle her to the center of the moment.',
sc:['Let her response land without absorbing it. Redirect to the people whose responses are actually for you.'],
correction:'Receive congratulations from the people giving them. Do not tend to her emotional response to your news. Turn toward others.'},

{id:'val-loop',g:'attention',l:'Validation loop / story repetition',
w:'Repeats the same story, point, or concern multiple times in one conversation until the room produces sufficient acknowledgment. Not memory lapse -- the loop continues until she gets what she needs. Also captures the unfunny funny story repetition.',
ex:'Tells the same story twice in one evening. Returns to the same point three times after it has already been acknowledged.',
int:'One acknowledgment is enough. You are not required to produce fresh engagement each time the loop returns.',
sc:['"You mentioned that earlier." said warmly once. Or give the same flat warm response each time without escalating.'],
correction:'Do not produce escalating engagement each time the loop returns. The same minimal response each cycle teaches the loop that repetition does not produce more.',
foldNote:'Also captures: ambient distress signaling -- unprompted sighs or sounds of exhaustion that function as nonverbal validation bids.'},

// ============================================================
// HIERARCHY & AUTHORITY
// ============================================================

{id:'cvt-pos',g:'hierarchy',l:'Covert positioning',
w:'Hierarchy plays with plausible deniability. The move serves her positioning while leaving nothing to be held accountable for if named.',
ex:'Offers help you did not ask for in a way that implies you needed it.',
int:'Name it internally. You do not have to respond to the surface. Respond to your own clarity.',
sc:['Stay warm. Stay unbothered. No verbal response required.','"Mm." (acknowledge without engaging the frame)'],
correction:'Do not take the bait. Receiving a covert positioning move with flat warmth is itself a response. You do not have to engage the frame it creates.'},

{id:'hie-res',g:'hierarchy',l:'Hierarchy reset via warmth',
w:'Uses affectionate language to reestablish herself as the senior person in the room. The warmth is real but administered from above. Also captures grading behavior -- "okay, good Abri" with claps -- approval dispensed from a position of evaluation.',
ex:'"Thanks kids." After a dinner you cooked in your home. Also: "okay, good Abri" with smirk and small claps after being told AA installed the sink filter.',
int:'The word "kids" did structural work. The clapping did structural work. You felt it. You do not have to name it -- just know what it was.',
sc:['"Mmhm." (neutral acknowledgment)','Smile and redirect.'],
correction:'Receive without matching energy. Do not thank her for the "compliment." A flat warm acknowledgment is sufficient and does not co-sign the hierarchy.'},

{id:'ass-ign',g:'hierarchy',l:'Assumed ignorance projection',
w:'Explains things as if it is everyone\'s first time hearing it because she did not know it, so no one could have known it before her. An intellectual authority move dressed as sharing.',
ex:'Explains a basic cooking technique to a room of adults who all already knew it.',
int:'You do not have to perform surprise or gratitude.',
sc:['"Yeah, I\'ve come across that." (matter of fact, no elaboration)'],
correction:'A flat acknowledgment that signals prior knowledge without correction. "I\'ve read about that" said once closes the loop without humiliating her.'},

{id:'rap-sta',g:'hierarchy',l:'Rapid status filing',
w:'Establishes credentials or background early when meeting someone new. Files her position before the relationship can form organically.',
ex:'Within the first few minutes: where she is from, what she did professionally, what she has been through.',
int:'She needs the frame set before impressions form. That urgency is information.',
sc:['No response required. Observe the sequence.'],
correction:'You cannot prevent this. You can be present as yourself without performing complementary deference.'},

{id:'sta-ass',g:'hierarchy',l:'Status assessment questioning',
w:'Asks new people questions that are really hierarchy calculations disguised as interest. She is sorting, not connecting.',
ex:'Job, family, background questions delivered quickly and early in a new interaction.',
int:'Watch what shifts in her treatment of the person once the assessment lands.',
sc:['Observe. Note what changes after she gets her data.'],
correction:'No direct correction available. Being warm and engaged with the person being assessed regardless of their status outcome is a quiet counter.'},

{id:'cul-aut',g:'hierarchy',l:'Cultural authority positioning',
w:'Positions herself as the most authentic cultural or linguistic authority when relevant. With AA she apologizes for Spanish. With new people she wields it. Same tool, different function depending on who gives her more leverage.',
ex:'With a new Spanish speaker: leads in Spanish, corrects pronunciation, references regional specifics.',
int:'Same tool, different function depending on who gives her more leverage.',
sc:['Speak Spanish naturally if it arises. You do not need to perform or hide fluency.'],
correction:'Speak Spanish naturally and competently without announcing it. Your fluency is not a competition -- it is just a fact.'},

{id:'uns-adv',g:'hierarchy',l:'Unsolicited advisory',
w:'Volunteers opinions about your home or choices framed as helpful observation. An authority claim dressed as generosity.',
ex:'"You know what would be really good here is..." in a space that is working fine.',
int:'Your home is working fine. You did not ask. You are not required to implement or defend.',
sc:['"Mm, I\'ll keep that in mind." (warm, noncommittal, closed)','"We like it this way."'],
correction:'Acknowledge once without committing to implementation. Do not defend your choices against the implied criticism. "We like it this way" is complete.'},

{id:'rhe-q',g:'hierarchy',l:'Rhetorical questioning',
w:'Asks questions she already knows the answer to. Used to test, display knowledge, or set up a correction.',
ex:'Asks how you made something she watched you make, or about something she was already told.',
int:'She is not asking. She is positioning. Answer plainly without over-explaining.',
sc:['"Yes." / "No." / "Mm-hmm." (brief, warm, closed)'],
correction:'Brief, accurate answers without elaboration. The less you expand, the less there is to position against.'},

{id:'dia-aut',g:'hierarchy',l:'Diagnostic authority',
w:'Declares how someone feels or why without confirmation. Supplies the cause and the diagnosis simultaneously, often implicating others in the same breath. Her ownership of HE\'s inner experience extends to assigning blame for it.',
ex:'"He\'s not feeling well because of the butter." (Two tablespoons of butter.)',
int:'She owns his inner experience and assigns cause without evidence. The implication of you is the bonus. Do not defend the butter.',
sc:['No response required. Do not defend the butter.'],
correction:'Do not engage the diagnosis or the implication. Defending the butter confirms there is something to defend. Silence or subject change is sufficient.'},

{id:'home-dir',g:'hierarchy',l:'Home direction giving',
w:'Actively directs people within your home -- telling guests where to sit, how things should be done, what the plan is -- as if she has authority over the space. Distinct from unsolicited advisory which is opinions. This is commands.',
ex:'Tells a guest where to sit. Announces what is happening next. Redirects how something in the kitchen is being done without being asked.',
int:'She does not live here. Directing people in this space is not her role.',
sc:['"Actually we usually do it this way." said warmly once.','Or step in quietly and redirect without explanation.'],
correction:'Speak first. Be the one who directs guests, announces plans, and sets the tone in your own home. Remove the vacuum she fills.'},

{id:'dec-credit',g:'hierarchy',l:'Decision credit claiming',
w:'Reframes your autonomous decisions as something she would have suggested, already knew was right, or quietly influenced. Takes credit for your agency without having been involved.',
ex:'You make a choice. Later: "yes I thought that was the right move" or "I was going to suggest that."',
int:'Your decisions belong to you. Her post-hoc co-signing does not change their origin.',
sc:['"Mm." and move on. Do not engage the reframe.'],
correction:'Do not correct the record publicly. Do not explain that it was your idea. Receive her co-sign without validating it as accurate.'},

{id:'fam-hist',g:'hierarchy',l:'Family historian positioning',
w:'Self-appoints as the keeper of family memory and the authority on how things really happened. Her version of events is positioned as the definitive one.',
ex:'Corrects others\' accounts of family events. "That\'s not how it happened. What that really meant was..."',
int:'She is the narrator of a story she also stars in. That is not neutral authority. You are allowed to hold your own version.',
sc:['"Interesting, I remember it differently." said once, warmly, without elaboration.'],
correction:'You do not need her version to be officially wrong. Stating your version once and holding it internally is enough.'},

{id:'age-trump',g:'hierarchy',l:'Age/experience trump card',
w:'Uses life stage or accumulated suffering as an automatic closer on disagreement. "When you get to my age" or "you\'ll understand someday" forecloses the conversation before it can develop.',
ex:'Someone offers a different perspective. She responds with what age and experience have taught her, positioning her view as beyond challenge.',
int:'Age is not an argument. Experience does not automatically confer correctness.',
sc:['"Maybe." said warmly and leave it.'],
correction:'Receive it without conceding. "Maybe" is not agreement. It is a graceful non-engagement that neither validates the trump card nor invites escalation.'},

{id:'oblig-gen',g:'hierarchy',l:'Obligating generosity',
w:'Offers help, gifts, or resources in a way that creates debt rather than warmth. Has an audience, or comes with implicit expectation of return, or is offered in a way that makes declining seem like ingratitude.',
ex:'Offers something you did not ask for in front of others in a way that makes refusing seem rude. Or does something for you and references it later.',
int:'Generosity that creates debt is not generosity. Accepting is not agreement to the ledger.',
sc:['"Thank you." warm and closed. One thank you is enough.'],
correction:'Receive with one warm acknowledgment. Do not produce effusive gratitude. Do not reference it later as a favor you owe. Let it be given without being owed.'},

// ============================================================
// CREDIT & NARRATIVE CONTROL
// ============================================================

{id:'crd-red',g:'credit',l:'Credit redirection',
w:'When AA receives direct praise she finds the seam to redirect it. Amplifies someone else\'s contribution. Does not lie but editorializes.',
ex:'HE praises AA directly. AN finds HM\'s contribution and makes that the headline instead.',
int:'HE gave you the credit. You do not need her co-sign.',
sc:['Receive the original compliment fully. Do not look to her for validation.'],
correction:'Turn toward the person who gave the compliment. Receive it fully. Do not glance toward her or wait for her endorsement.'},

{id:'inf-app',g:'credit',l:'Information appropriation',
w:'Retells your or HM\'s information as if she originated it. The source quietly shifts to her in the retelling.',
ex:'You told her something last month. She tells the room the same thing this week as if she discovered it.',
int:'You know where it came from. That is enough.',
sc:['Do not correct publicly. Log it. Note frequency.'],
correction:'If you choose to address it: "Oh yes -- AA actually told me about that recently" said warmly by HM is more effective than anything you can say directly.'},

{id:'nar-rev',g:'credit',l:'Narrative revision',
w:'Reframes outcomes she did not get so it sounds like the result was her preference all along. She never loses because she rewrites the score.',
ex:'A plan she pushed for did not happen. Later: "I actually thought the other way was better anyway."',
int:'You know what happened. The revision does not change it.',
sc:['Hold the truth internally. Do not correct the record publicly.'],
correction:'You do not need the official record to reflect what actually happened. Holding the truth privately without requiring her to confirm it is a form of protection.'},

{id:'cur-nar',g:'credit',l:'Curated family narrative',
w:'Presents the family in an image-managed way to new people. The story is controlled before they can form their own impressions. Also captures distorted retellings to absent people -- the same events retold with her more central, more sacrificial, or more capable.',
ex:'Tells a new person about the family\'s accomplishments and closeness, positioning herself centrally. Also: retells a visit to someone who was not there in a version where she hosted.',
int:'New people get the version she needs them to have. You know the fuller picture.',
sc:['You do not have to manage or correct the narrative publicly.'],
correction:'You cannot control what she tells people who are not there. You can be yourself fully with the people who are present so their direct experience of you is not her version.',
foldNote:'Also captures: distorted retelling to absent people -- retelling events to people who were not there in a version where she is more central or capable.'},

{id:'bck-hnd',g:'credit',l:'Backhanded compliment',
w:'Praise with a quiet qualifier buried in it. The compliment is real enough to accept. The qualifier does damage underneath.',
ex:'"I didn\'t know you could cook like this." "You look so good -- I almost didn\'t recognize you."',
int:'You can receive the compliment and release the qualifier. You are not required to carry it.',
sc:['"Thank you." (receive only the compliment, full stop. Do not respond to the qualifier.)'],
correction:'Receive the compliment with a simple thank you. Do not respond to the qualifier verbally or non-verbally. Not registering it publicly denies it its effect.'},

{id:'cmp-dis',g:'credit',l:'Comparative dismissal',
w:'References how things were done better or differently elsewhere when something does not go her way.',
ex:'"In Mexico City we always did it this way..."',
int:'A verdict dressed as information. You do not have to receive it as either.',
sc:['"Mm, interesting." (flat, warm, noncommittal)','"We like how we do it."'],
correction:'"We like how we do it" said once and return to what you were doing. Do not defend your method against the comparison.'},

{id:'exc-app',g:'credit',l:'Excitement appropriation',
w:'When someone else is excited she cuts them off, briefly narrates their excitement as if she shares it, then pivots to herself as the main subject.',
ex:'HE is excited about something. She interrupts, says "yes yes I know I love that too," then talks about herself.',
int:'He never gets to fully inhabit his own moment.',
sc:['Let the excited person finish. Do not fill the space she creates after.'],
correction:'When she pivots, redirect back. "You were saying, HE?" returns the floor without confrontation.'},

{id:'aftertho',g:'credit',l:'Afterthought framing',
w:'Presents AA as an intentional inclusion when she was an afterthought. Gets credit for generosity and thoughtfulness without having actually prioritized AA. The performance of inclusion does the work that actual inclusion did not.',
ex:'Gets something for HM and adds AA as an addendum but frames the whole thing as having been planned for both. Acts excited about her own generosity.',
int:'The performance of inclusion is not inclusion. You do not have to receive it as genuine.',
sc:['"Oh, that\'s nice." Receive it lightly. Do not match her energy.'],
correction:'One warm acknowledgment. Do not thank her effusively for something that was not actually for you. The flat warm response signals you received it without being fooled by it.'},

{id:'acc-min',g:'credit',l:'Accomplishment minimization',
w:'When AA shares good news or an achievement, AN gives brief surface acknowledgment followed immediately by a redirect -- to a different topic, to herself, or to HM. The accomplishment is received but not held.',
ex:'AA mentions her new job. AN says congratulations then within seconds is talking about how her own remote work helped her garden and exercise more.',
int:'You are allowed to hold your own moment. Her redirect does not erase what you shared.',
sc:['Receive congratulations from the people who are actually giving them. Do not chase her back to your news.'],
correction:'Stay in the moment with the people who are celebrating you. Do not look toward her for validation of your news.'},

{id:'exp-own',g:'credit',l:'Experience ownership',
w:'Retells shared experiences -- trips, meals, visits, moments -- as if she was the architect or driving force. Her narrative version positions her as central to something that was actually collective or that you or HM created.',
ex:'Retells a visit to your home as if she hosted it. Describes a meal you cooked as something that happened at a gathering she arranged.',
int:'You know who made what. The retelling does not change the facts.',
sc:['Do not correct publicly. Log it.'],
correction:'If the retelling reaches you through others, one clarifying sentence is enough. "Actually that was at our place and AA cooked." Said once, warmly, closes the record.'},

// ============================================================
// REJECTION & WITHHOLDING
// ============================================================

{id:'wrm-dis',g:'rejection',l:'Warmth/distance switch',
w:'Alternates closeness and coldness unpredictably. The warmth is never stable enough to fully trust. The distance is never speakable.',
ex:'Warm and engaged one moment. Noticeably cooler the next with no apparent trigger.',
int:'Both are her regulation tools. You do not have to chase the warmth or manage the distance.',
sc:['Match warmth when present. Do not pursue it when it withdraws.'],
correction:'Do not adjust your behavior in response to the switch. Stay consistent. Your consistency makes the switching less effective as a regulation tool.'},

{id:'wgt-sil',g:'rejection',l:'Weighted silence',
w:'Goes quiet in a way that fills the room after not getting her way. The tell is whether it triggers someone else to repair. Cultural context matters -- silence as conflict avoidance is normative. The diagnostic question is whether the silence is used to produce discomfort in others.',
ex:'A plan she wanted does not happen. She says nothing but the temperature in the room drops.',
int:'You are not the target and not the repair person. Watch who moves and what it costs them.',
sc:['Do not fill the silence. Do not over-warm toward her. Stay even.'],
correction:'Do not repair. Do not fill the space. Let HE or HM navigate it if they choose. Your non-response gradually removes you as a reliable target for this move.'},

{id:'sub-pen',g:'rejection',l:'Subtle penalty withdrawal',
w:'Becomes slightly less warm, slightly less engaged after not getting her way. A quiet consequence for whoever crossed her.',
ex:'After being declined on something she becomes measurably less present for the rest of the evening.',
int:'The withdrawal is designed to create anxiety around her approval. You do not need it.',
sc:['Stay even. Do not chase the warmth back. Do not over-perform to recover it.'],
correction:'Continue at your baseline. Do not perform to recover her warmth. Her approval is not the metric you are working toward.'},

{id:'ref-rec',g:'rejection',l:'Refusal to receive',
w:'Consistently declines what AA specifically offers while sourcing or accepting the same things from elsewhere. Avoids being placed in a position of gratitude toward AA in AA\'s own home.',
ex:'Declines offered fruit. Buys the same fruit in bulk. Declines the prepared fruit dessert. Three times, one day.',
int:'Accepting from you would tip the dynamic. She corrects that without saying a single word about it.',
sc:['Offer once, warmly. Let it go after.'],
correction:'Offer once. Do not offer again. Her repeated decline is information, not an invitation to find a better way to offer.'},

{id:'bod-sur',g:'rejection',l:'Body surveillance',
w:'Comments on or monitors what AA eats, drinks, or how much. Makes AA self-conscious at her own table in her own home.',
ex:'"Oh you\'re having another one?" said with a light tone.',
int:'Your body, your table, your choices. You owe no accounting.',
sc:['"I\'m good, thanks." (warm, closed)','Continue what you were doing without explanation.'],
correction:'No justification, no explanation. Continue what you were doing. One brief closed response if necessary then move on.'},

{id:'excl-spa',g:'rejection',l:'Exclusionary Spanish',
w:'Speaks Spanish to create a moment of exclusion first, then performs the apology. The apology is the second half of the same move.',
ex:'Says something to HM in Spanish that clearly pertains to the room. Then: "Sorry, I don\'t know how to say that in English."',
int:'The exclusion came first. You caught it. That is the information.',
sc:['Respond in Spanish if you choose. Or let it go.'],
correction:'Responding in Spanish -- naturally and without announcement -- signals competence without confrontation. Or receive it flatly and move on.'},

{id:'spa-apo',g:'rejection',l:'Spanish apology',
w:'After six years of correction, still apologizes for speaking Spanish to AA. The apology is not about uncertainty -- it restates a version of AA she prefers: one who might not fully understand.',
ex:'"Sorry Abri, I said that in Spanish -- I don\'t know how to say all that in English."',
int:'This is a narrative she maintains, not a memory lapse. The correction was never the point.',
sc:['"All good." (flat, warm, move on)','"I understood." (direct, no elaboration)'],
correction:'Do not re-correct. The correction was never received. A flat "all good" or demonstrating comprehension without comment is more effective than another correction.'},

{id:'str-omi',g:'rejection',l:'Strategic omission',
w:'Goes noticeably quiet or skirts around a specific topic or person when they are introduced into conversation. Cannot compete with that person\'s position so she exits the subject.',
ex:'AA mentions her mom. AN goes quiet or quickly redirects.',
int:'The silence around your mom is information about how she reads that relationship.',
sc:['You can mention your mom as often as you want. Watch what she does with it.'],
correction:'Mention your family naturally and consistently. Her discomfort with the subject is hers to manage. You do not need to protect her from it.'},

{id:'wthld-ack',g:'rejection',l:'Withheld acknowledgment',
w:'Specifically withholds a positive response in moments where a normal person would naturally say something. The absence is the move. Your cooking, your home, your work, your effort -- received without the acknowledgment they warrant.',
ex:'The pasta dinner. HE praised the food directly. AN said "yes mmhm" quietly. A normal person at that table would have said something genuine.',
int:'The silence where a compliment should be is data. You do not need her acknowledgment to know what you did was good.',
sc:['Receive acknowledgment from the people who gave it. Do not look toward her for validation.'],
correction:'Orient toward the people who are actually responding to you. Her silence loses its power when it is no longer the response you are waiting for.'},

{id:'fam-hier',g:'rejection',l:'Family hierarchy positioning',
w:'Explicitly or implicitly positions AA\'s family as less important, less close, or less worthy of engagement. "I am not ready for a relationship with your family" -- your family is something she gets to decide her relationship to on her own timeline.',
ex:'"I\'m not ready for a relationship with your family." Going quiet when your mom is mentioned. Never asking about your parents or siblings.',
int:'Your family does not need her readiness to matter. Her positioning of them as optional is a statement about her hierarchy, not about your family\'s value.',
sc:['You are allowed to mention your family as often as you want.'],
correction:'Do not reduce mentions of your family to manage her comfort. Do not treat her "readiness" timeline as a legitimate framework. Your family exists independently of her schedule.'},

{id:'phys-excl',g:'rejection',l:'Physical warmth exclusion',
w:'Consistently warm with everyone else in the room while AA is the specific exception. Not the alternating warmth/distance pattern -- this is targeted consistency. She is warm to the room and specifically not to AA.',
ex:'Hugs HM, touches HE affectionately, engages warmly with guests. Does not extend physical warmth to AA across multiple visits.',
int:'This is not about you being cold. This is about you being someone she cannot afford to be warm toward without tipping the dynamic.',
sc:['You do not need her warmth to be comfortable in your own home.'],
correction:'Do not pursue her physical warmth. Do not signal that its absence affects you. Your comfort in your home does not depend on her extending it to you.'},

{id:'perf-inq',g:'rejection',l:'Performative inquiry / disengagement',
w:'Asks questions about AA but visibly disengages when AA answers. Looking away, minimal response, quick pivot. The question is for appearance, not interest.',
ex:'Asks how your studies are going. You begin to answer. She looks away, gives a flat "mm," and moves on before you finish.',
int:'The question was not for you. It was for the room. You are not obligated to perform enthusiasm in response to an inquiry that was never genuinely made.',
sc:['Answer briefly. Do not expand into the space. One or two sentences and let it land.'],
correction:'Give brief answers and stop. Do not try to capture her attention with more interesting information. The disengagement is not about what you are saying.'},

{id:'sel-ret',g:'rejection',l:'Selective retention',
w:'Retains information about AA that is useful for monitoring or positioning while discarding information that would require treating AA as a full person worth knowing. Knows too much and nothing at the same time.',
ex:'Remembers details about your schedule or movements. Does not remember your interests, your work, your preferences after multiple mentions.',
int:'Being monitored and being known are different things. She monitors you. She does not know you. That gap is intentional.',
sc:['You do not owe her more information than you choose to give.'],
correction:'Be selective about what you share. Information you give her will be used for positioning, not for knowing you. Share what you are comfortable having monitored.'},

{id:'diff-warm',g:'rejection',l:'Differential warmth toward HM\'s domain',
w:'Engages warmly with things that belong to HM in the shared home -- his equipment, his spaces, his routines -- while treating things that are clearly AA\'s with indifference or mild dismissal.',
ex:'Admires HM\'s gym equipment enthusiastically. Offers minimal acknowledgment of what AA has created, installed, or built in the same space.',
int:'Your home is yours. Her warmth toward his things and indifference toward yours is a territorial statement.',
sc:['Continue building your home without reference to her assessment of it.'],
correction:'You do not need her acknowledgment for your domain to be yours. Build and maintain it at the same level regardless of whether she notices.'},

// ============================================================
// DEFLECTION & AVOIDANCE
// ============================================================

{id:'non-apo',g:'deflection',l:'Non-apology apology',
w:'"I\'m sorry you felt that way." The form of an apology without the substance. Responsibility quietly transferred outward.',
ex:'"I\'m sorry, I was just trying to help." "I\'m sorry you took it that way."',
int:'A real apology contains accountability. This contains an explanation. Those are different.',
sc:['"Mm." (receive without validating it as a full apology)','Do not say it\'s okay if it was not okay.'],
correction:'Receive it neutrally without validating it as a real apology. "Mm" is not acceptance. It is acknowledgment without absolution.'},

{id:'his-gri',g:'deflection',l:'Historical grievance deflection',
w:'Surfaces an unrelated past event when something in the present does not go her way. Makes the current moment impossible to resolve.',
ex:'Current issue comes up. Suddenly a thing from two years ago is on the table.',
int:'The deflection puts everyone on defense. You do not have to litigate the past.',
sc:['"That\'s a separate conversation." (calm, warm, firm)','Do not engage the historical thread.'],
correction:'Name the deflection once without engaging the content. "That\'s a separate conversation" and hold. Do not follow the thread into the past.'},

{id:'nvb-edi',g:'deflection',l:'Nonverbal editorializing',
w:'A breath, a small sound, a quiet "mmm" that communicates displeasure without being speakable or quotable.',
ex:'A decision is made she did not want. She says nothing but makes a sound the whole room heard.',
int:'You heard it. So did everyone. She knows that. That is why it works.',
sc:['Do not respond to the sound. Continue as if it was not there.'],
correction:'Continue the conversation without acknowledgment. Responding to the sound validates it as communication. Not responding removes its function.'},

{id:'cvt-sur',g:'deflection',l:'Covert surveillance glance',
w:'When she did not originate an idea she goes quiet, then glances at you when she thinks you cannot see. She is gathering data and recalibrating -- highly engaged, not withdrawn.',
ex:'Someone else\'s idea gets a good reaction. She goes quiet. Then the glance.',
int:'The silence is calculation. She is figuring out her next move.',
sc:['Stay natural. Do not signal you caught it. Log it.'],
correction:'Stay natural. Do not signal awareness. The glance is surveillance -- your non-reaction gives her no data to work with.'},

{id:'img-rep',g:'deflection',l:'Image repair via generosity',
w:'Overcorrects into visible warmth or generosity immediately after showing displeasure. Overwrites the moment so the room\'s last memory of her is warmth.',
ex:'She was clearly off for twenty minutes. Then: sudden warmth, a generous gesture, a compliment.',
int:'The generosity is for the room\'s perception of her, not for you.',
sc:['Receive it warmly. Do not match the elevated energy. Stay even.'],
correction:'Receive the generosity without treating it as evidence that the earlier behavior did not happen. Both exist. The repair does not erase the pattern.'},

{id:'he-tri',g:'deflection',l:'HE triangulation',
w:'Pulls HE in as an indirect witness or validator when she does not get her way. He is primed to respond.',
ex:'Something does not go her way. She makes a comment to HE or gives him a look that recruits him as witness.',
int:'This is not your conflict to manage. It is a dynamic between her and her family system.',
sc:['Do not insert yourself. Let HE navigate his own lane.'],
correction:'Do not insert yourself into the triangulation. Let HE respond as he will. Your non-participation keeps you out of the triangle.'},

{id:'prf-acc',g:'deflection',l:'Performed acceptance',
w:'"No no it\'s okay." Slightly too polished to be genuine. Everyone knows it but nobody can name it. Also captures humor deflection -- laughing off or joking away an uncomfortable moment so it cannot land.',
ex:'"No really, it\'s fine." Delivered with a smile that does not reach. Also: something uncomfortable is named and she makes a joke that changes the energy before anyone can respond.',
int:'You feel the unresolved tension. That is real. You do not have to chase or resolve it.',
sc:['Take the acceptance at face value publicly. Do not work to make it genuine.'],
correction:'Receive the acceptance at face value. Do not try to make it genuine by pursuing the real conversation. The performed acceptance is her close of the subject.',
foldNote:'Also captures: humor deflection -- using a joke or laugh to change the energy when something uncomfortable is being named.'},

{id:'ovc-apo',g:'deflection',l:'Overconsumption with performative apology',
w:'Uses all of something in AA\'s home and then looks at AA and apologizes for it. The apology maintains deniability but the action already happened.',
ex:'Uses the last of something, makes eye contact, apologizes with a small laugh.',
int:'She said sorry so nothing can be held. But she used it all. Both things are true.',
sc:['Accept the apology warmly. Replace the item at your own pace.'],
correction:'Accept once warmly. Replace without comment. Do not make it a moment that she can perform more remorse around.'},

{id:'feign-con',g:'deflection',l:'Feigned confusion / reality editing',
w:'When something she said or did is named she contests the premise entirely. "I didn\'t say that." Said with genuine-seeming confusion that makes the person naming the behavior feel uncertain about their own memory.',
ex:'She says something. It is named. She responds as if she has no recollection or understanding of what is being referenced.',
int:'You know what you heard. Her confusion is not evidence that you misheard. This is gaslighting-adjacent. Trust your perception.',
sc:['"I heard what I heard." said once, warmly, and done.'],
correction:'State what you observed once without elaboration or defense. Do not enter the debate about whether it happened. "I heard what I heard" and move on.'},

{id:'conv-unavail',g:'deflection',l:'Convenient unavailability',
w:'Suddenly becomes tired, busy, or preoccupied specifically when something is expected of her that she does not want to do. Disappears from situations that would require her to give, contribute, or be accountable.',
ex:'Pear dessert is being made. She goes upstairs. Something is expected and she is no longer available for it.',
int:'Her unavailability is information. It tells you what she is and is not willing to be present for.',
sc:['Continue what you were doing. Do not pursue her. Do not adjust the plan.'],
correction:'Continue the activity without accommodating her absence. Do not adjust plans to make participation easier. Let her absence be hers.'},

{id:'suf-red',g:'deflection',l:'Suffering redirect',
w:'When someone else\'s grievance or difficulty is being discussed she brings up her own suffering or hardships, redirecting toward sympathy for her. Accountability cannot survive in a room focused on her pain.',
ex:'A difficulty is being discussed. She introduces something she went through that is harder, older, or more significant.',
int:'Her suffering is real. Its deployment in this moment is strategic. Both things can be true.',
sc:['Acknowledge her briefly. "That sounds really hard." Then return to the original subject if it matters.'],
correction:'Brief acknowledgment then return to the original subject. Do not follow the redirect into her suffering narrative.'},

{id:'sil-noncomp',g:'deflection',l:'Silent non-compliance',
w:'Agrees to something in the moment then quietly does not follow through. No confrontation, no explanation, no renegotiation. The commitment evaporates.',
ex:'Agrees to something during the visit. After the visit it is never referenced again.',
int:'Agreement without follow-through is not agreement. Her yes does not mean yes.',
sc:['Over time stop relying on her commitments without external accountability.'],
correction:'Do not rely on verbal agreements from her without external accountability structures. Note the pattern over time and adjust expectations accordingly.'},

{id:'escl-conf',g:'deflection',l:'Escalation when confronted',
w:'When covert moves stop working and something is named directly she shifts to harder tools -- blame assignment and reality revision. The mask comes off. This is a different threat level from everything else in the tracker.',
ex:'The last time something was named she assigned blame to the person who named it and then attempted to gaslight everyone involved.',
int:'This is why direct confrontation carries high risk. The covert tools are the first layer. Underneath them is something harder. Be strategic about when, how, and in front of whom anything is named.',
sc:['"I\'m not going to argue about what happened." said once, calmly, then disengage.','Do not try to win the gaslighting battle in the moment. Document everything after.'],
correction:'Do not engage the blame or reality revision in the moment. State your position once and disengage. Document after. Choose confrontations very carefully knowing this is the likely response.'},

// ============================================================
// HM-SPECIFIC
// ============================================================

{id:'hm-arc',g:'hm',l:'Relational archaeology',
w:'Uses inside references, nicknames, or shared language with HM in front of AA. Surfaces the pre-AA HM.',
ex:'A nickname from childhood, a shared reference that predates AA, delivered to HM in front of her.',
int:'She was there first. That is true. It does not diminish where he is now or who he chose.',
sc:['You do not need to insert yourself. You are already the primary relationship.'],
correction:'You do not need to compete with his history. Your relationship with him is not diminished by the existence of what came before.'},

{id:'hm-car',g:'hm',l:'Caregiving boundary erosion',
w:'Manages HM\'s physical needs or comfort during visits as if that role is still hers.',
ex:'"Hijo you need to eat more." Handling his plate. Commenting on his rest.',
int:'He has a wife. She has a son. Those are different roles.',
sc:['"I\'ve got it." (warm, firm, no explanation)'],
correction:'Step in warmly and without explanation. "I\'ve got it" said once while doing the thing is sufficient. No confrontation required.'},

{id:'hm-phy',g:'hm',l:'Physical reclamation',
w:'Touches HM in ways that linger or happen more frequently than the context calls for. Territorial behavior subtle enough to be deniable.',
ex:'Fixing his collar, touching his arm multiple times, smoothing his hair.',
int:'You felt it because it was there. You do not have to name it to anyone.',
sc:['No response required. Log frequency. Note context.'],
correction:'You cannot address this directly without it becoming a scene. Log frequency and note whether HM notices or responds. The pattern over time is the data.'},

{id:'hm-rol',g:'hm',l:'Role displacement',
w:'Steps into AA\'s role as HM\'s wife by doing things for him that would normally be hers to do.',
ex:'The French press in AA\'s kitchen. Cooking something specifically for him.',
int:'She brought her apparatus into your space. That is the whole sentence.',
sc:['"I\'ve got it." (warm, calm, step in)','Or let it go and note it.'],
correction:'Step in quietly when you choose to. "I\'ve got it" without elaboration is enough. Or let it pass and log it. Not every instance requires intervention.'},

{id:'hm-acc',g:'hm',l:'Access control',
w:'Manages who gets access to HM and when. Monopolizes his time. Delivers invitations to his own spaces as if she controls entry. Also captures remote hosting insertion -- inserting herself into the hosting of your home even when not physically present.',
ex:'Tells AA she can come to HM\'s workplace -- framed as checking whether she would like it. Over FaceTime telling HM\'s friend she was glad she was there and to enjoy her time.',
int:'That is his job. You are his wife. The invitation should not have come from her. The FaceTime welcome to your guest was a reach.',
sc:['You can insert yourself into plans that involve your husband.'],
correction:'Be the one who extends invitations, welcomes guests, and makes plans involving your home and your husband. Occupy the role. Remove the vacuum.',
foldNote:'Also captures: remote hosting insertion -- inserting herself as welcoming authority into your home over FaceTime or through messaging even when not physically present.'},

{id:'hm-fin',g:'hm',l:'Financial disclosure as intimacy',
w:'Shares financial details with HM in a way that creates a private channel bypassing AA. Creates a loyalty tension.',
ex:'Long explanation of her Mexican social security and life insurance directed at HM specifically.',
int:'This creates a loyalty tension. He holds information about her that you may not.',
sc:['Ask HM later privately. "What was that about?" (neutral, curious)'],
correction:'Ask HM about it privately after. Not confrontationally -- genuinely. "What was that about?" keeps you informed without making it a conflict.'},

{id:'hm-gra',g:'hm',l:'Gratitude as tethering',
w:'Expresses gratitude in a way that converts HM\'s accomplishments into something that exists in service of his parents. Gratitude that routes his growth back to her.',
ex:'"Not a lot of parents have a son who knows so much. Me and HE have improved so much because of you."',
int:'His growth belongs to him. Gratitude that routes it back to her is still a tether.',
sc:['No response required. Let HM receive it and watch how he does.'],
correction:'Watch how HM receives it. His response tells you about where he is in his differentiation process. No intervention required from you.'},

{id:'hm-sac',g:'hm',l:'Sacrifice ledger',
w:'Brings up sacrifices she made for HM unprompted and casually. A running emotional tab of what he owes her.',
ex:'"I gave up so much for you boys." Woven into a casual conversation.',
int:'The debt is never named directly so it can never be paid or addressed. That is by design.',
sc:['Do not engage the ledger. Do not validate or challenge it.'],
correction:'Do not engage or validate the ledger. Do not add to it by expressing sympathy that confirms the debt frame.'},

{id:'hm-apr',g:'hm',l:'Approval seeking as ritual',
w:'Seeks HM\'s opinion on small things she does not genuinely need input on. Keeps him in the position of being who she turns to.',
ex:'"Hijo what do you think I should order?" for something she has eaten a hundred times.',
int:'The ask is not about the decision. It is about maintaining the dynamic.',
sc:['You can offer your own input if you want. Or let it be between them.'],
correction:'You can offer your opinion first, warmly, which inserts yourself into the dynamic without confrontation. Or let it pass.'},

{id:'hm-dsg',g:'hm',l:'Distance guilt',
w:'Frames missing HM in a way that makes him feel responsible for her emotional pain around the distance.',
ex:'"It\'s just so hard when you\'re not around. I don\'t know how I manage."',
int:'He grew up. He did not abandon her. The framing does not make that distinction.',
sc:['Do not validate the guilt frame. Do not challenge it publicly.'],
correction:'Do not validate the guilt frame in conversation with HM. Helping him see the distinction between love for his parents and responsibility for their emotional regulation is slow, private work.'},

{id:'hm-prx',g:'hm',l:'Proxy communication',
w:'Says things to HM or HE that are clearly meant for AA to hear. Delivers the message and maintains full deniability.',
ex:'"Hijo make sure you\'re taking care of yourself." Said while AA is in earshot in her own well-run home.',
int:'You are the actual audience. You do not have to respond as if the message was not for you.',
sc:['You can respond directly to what was said as if it was addressed to the room.','Or let it go and log it.'],
correction:'You can respond to the content of the message directly and warmly as if it had been addressed to you -- which removes the deniability without confrontation.'},

{id:'hm-dep',g:'hm',l:'Departure extraction',
w:'Goodbyes become extended emotional productions requiring HM to comfort and reassure her before she can leave.',
ex:'A goodbye that takes 30 minutes, tearful, with one more thing she needed to say.',
int:'The visit ends the same way it ran throughout.',
sc:['Say your goodbye warmly and early. Let the extraction happen without your participation.'],
correction:'Say your goodbye once, warmly, and step away. Let HM manage the extraction. Your absence from the production is a boundary without a confrontation.'},

{id:'hm-prp',g:'hm',l:'HM as prop',
w:'Displays HM more prominently when new people are present. His presence becomes part of her presentation. Also captures bond signaling -- shared looks, inside references, physical closeness with HM in front of new people to signal their bond as primary.',
ex:'Stands closer to him, references him more, touches him more when strangers are watching. Uses a shared reference only they have in front of a new person.',
int:'He is being used as a credential. A performance in front of new people does not change the truth of his life.',
sc:['No response required. Observe.'],
correction:'Be present with HM in your own register -- one that does not require an audience. Your relationship is visible in a different way than hers.',
foldNote:'Also captures: bond signaling to new people -- using shared looks, references, and physical closeness with HM specifically in front of new people to establish their bond as primary.'},

{id:'hm-chi',g:'hm',l:'Childhood centralization',
w:'Retells HM\'s childhood stories directly to him in front of AA, positioning herself as the protagonist of his origin story.',
ex:'Tells a story about HM\'s childhood directly to HM while AA is in the room.',
int:'His origin story is real. His current story is yours. Both can be true.',
sc:['Listen warmly. You do not have to compete with his history.'],
correction:'You cannot compete with his origin story and you do not need to. Your story with him is current and primary.'},

{id:'hm-svl',g:'hm',l:'Strategic vulnerability',
w:'Physical or emotional distress flares at notable moments -- particularly when attention is directed elsewhere or away from her.',
ex:'AA and HM are having a good moment. Suddenly she is not feeling well or becomes emotional.',
int:'The timing is the data, not the symptom.',
sc:['Let others respond. Keep your energy steady.'],
correction:'Continue what you were doing. Let others respond if they choose. Your steady non-reaction removes the reliability of the interruption.'},
