<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Covert Narc">
<title>The Covert Narcissist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap');
:root{
  --bg:#0c0b09;--surface:#131109;--card:#1a1712;--border:#252118;--bl:#302a1f;
  --text:#ede5d5;--muted:#8a7e6a;--dim:#4a4235;
  --a:#b87350;--ad:#2a1508;--am:#6a3018;--ab:#d4896a;
  --g1:#b87350;--g1d:#2a1508;--g1m:#6a3018;
  --g2:#7a9e8a;--g2d:#0e2018;--g2m:#2a5038;
  --g3:#9e7ab8;--g3d:#1a0e28;--g3m:#4a2a68;
  --g4:#b8a05a;--g4d:#281e08;--g4m:#685018;
  --g5:#7a9eb8;--g5d:#0e1828;--g5m:#2a4868;
  --g6:#b87a7a;--g6d:#280e0e;--g6m:#682a2a;
  --g7:#9eb87a;--g7d:#182808;--g7m:#486820;
  --g8:#b8907a;--g8d:#281808;--g8m:#684028;
}
body.light{
  --bg:#f5f0e8;--surface:#ede5d5;--card:#e8dcc8;--border:#d4c8b0;--bl:#c4b898;
  --text:#1a1410;--muted:#5a4e3a;--dim:#8a7e6a;--ad:#f0dcc8;--am:#c89060;--ab:#8a4820;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
.hdr{padding:48px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:100}
.hdr-eye{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.hdr-name{font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:300;font-style:italic;color:var(--ab);line-height:1}
.hdr-r{text-align:right;display:flex;align-items:flex-end;gap:10px}
.hdr-n{font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;font-weight:300;color:var(--dim);line-height:1}
.hdr-nl{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.theme-btn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--dim);cursor:pointer;font-size:14px;padding:4px 10px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:200}
.nbt{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
.nbt .ni{font-size:15px;line-height:1}
.nbt.on{color:var(--ab)}
.pg{display:none;padding:0 0 90px 0;min-height:100vh}
.pg.on{display:block}
.srch{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;background:var(--bg)}
.si{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;padding:8px 14px;outline:none}
.si::placeholder{color:var(--dim);font-style:italic}
.sc-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px}
.dfb{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;background:var(--bg)}
.di{background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;font-size:10px;padding:5px 8px;outline:none;color-scheme:dark}
body.light .di{color-scheme:light}
.dl{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.dc-btn{font-family:'DM Mono',monospace;font-size:9px;color:var(--a);background:none;border:none;cursor:pointer;padding:4px 8px}
.gb{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.gb::-webkit-scrollbar{display:none}
.gc2{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;color:var(--dim)}
.msel-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--ad);display:none;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px}
.msel-bar.on{display:flex}
.msel-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--ab);letter-spacing:.1em;text-transform:uppercase}
.msel-clear{background:none;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;padding:4px 8px}
.cs{padding:0 16px}
.csh{display:flex;align-items:center;gap:8px;padding:12px 0 6px;cursor:pointer;user-select:none}
.csd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.csn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;flex:1}
.csc{font-family:'DM Mono',monospace;font-size:10px}
.cst{font-size:11px;color:var(--dim);transition:transform .2s;display:inline-block}
.cst.op{transform:rotate(90deg)}
.cg{display:flex;flex-direction:column;gap:3px;overflow:hidden;transition:max-height .3s ease;margin-bottom:4px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;border:1px solid transparent;background:var(--surface);text-align:left;width:100%;position:relative}
.ci:active{opacity:.8}
.cin{font-size:13px;color:var(--text);flex:1;line-height:1.3}
.cic{font-family:'DM Mono',monospace;font-size:11px;min-width:20px;text-align:right}
.cii{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 6px;flex-shrink:0;font-family:'DM Mono',monospace}
.badge{position:absolute;top:-5px;right:30px;background:var(--g6);color:#fff;font-family:'DM Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:10px;letter-spacing:.05em;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.multi-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.mchip{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.mchip-x{background:none;border:none;color:inherit;cursor:pointer;font-size:11px;padding:0 2px;opacity:.7}
.lfp{margin:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:10px}
.lfs{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);min-height:13px;line-height:1.4}
.ln{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:10px 12px;resize:none;outline:none;height:72px;line-height:1.5;width:100%}
.ln::placeholder{color:var(--dim);font-style:italic}
.lb{padding:12px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;width:100%}
.lb.off{background:var(--border);color:var(--dim);cursor:not-allowed}
.fhd{padding:10px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.fl{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.15em;text-transform:uppercase}
.en{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
@keyframes fu{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.en{animation:fu .2s ease}
.est{width:2px;min-height:32px;border-radius:2px;flex-shrink:0;align-self:stretch;opacity:.8}
.eb{flex:1;min-width:0}
.et{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.eg{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:3px;white-space:nowrap}
.egr{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim)}
.etm{font-family:'DM Mono',monospace;font-size:8px;color:var(--dim);margin-left:auto;white-space:nowrap}
.eno{font-size:13px;color:var(--muted);line-height:1.6;font-weight:300;margin-top:2px}
.ea{display:flex;gap:4px;flex-shrink:0;flex-direction:column}
.ebt{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:3px;border-radius:3px}
.ebt.del:hover{color:#b05050}
.een{width:100%;background:var(--bg);border:1px solid var(--bl);border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;resize:none;margin-top:6px;line-height:1.5}
.ees{margin-top:6px;padding:6px 14px;border-radius:4px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.emp{padding:48px 16px;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:15px;color:var(--dim)}
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--a);color:#0c0b09;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:150}
.fab:active{transform:scale(.92)}
.dsr{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.dsi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;padding:8px 14px;outline:none}
.dsi::placeholder{color:var(--dim);font-style:italic}
.dgt{font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-weight:300;font-style:italic;padding:20px 16px 10px;border-bottom:1px solid var(--border);color:var(--muted)}
.dc2{border-bottom:1px solid var(--border)}
.dch{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.dcd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dcn{font-size:13px;color:var(--text);flex:1}
.dct{font-size:11px;color:var(--dim);transition:transform .2s;display:inline-block}
.dct.op{transform:rotate(180deg)}
.dcb{padding:0 16px 16px;display:none}
.dcb.op{display:block}
.dsl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:5px;margin-top:12px}
.dsl:first-child{margin-top:0}
.dtx{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300}
.dex{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:13px;color:var(--text);line-height:1.6;background:var(--card);border-left:2px solid var(--bl);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:5px;margin-bottom:4px}
.dsc{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:14px;color:var(--ab);line-height:1.6;background:var(--ad);border-left:2px solid var(--am);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:6px}
.cat-note-area{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.cat-note-ta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;outline:none;resize:none;line-height:1.5;min-height:60px}
.cat-note-ta::placeholder{color:var(--dim);font-style:italic}
.cat-note-btn{margin-top:6px;padding:6px 14px;border-radius:4px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.ip{padding:20px 16px}
.il{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.ita{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:14px;resize:none;outline:none;height:120px;line-height:1.6;margin-bottom:12px}
.ita::placeholder{color:var(--dim);font-style:italic}
.ibn{width:100%;padding:13px;border-radius:8px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;margin-bottom:20px}
.ibn:disabled{background:var(--border);color:var(--dim);cursor:not-allowed}
.irc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.irt{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ird{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.irn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;flex:1}
.irf{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim)}
.irr{font-size:13px;color:var(--muted);line-height:1.6}
.ilb{margin-top:8px;padding:7px 14px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-right:6px}
.ith{text-align:center;padding:30px 0;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;color:var(--dim);font-size:15px}
.hist-top{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.hist-sum-btn{padding:10px 16px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;width:100%;text-align:center}
.backlog-bar{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.backlog-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.sp{padding:16px}
.stl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:12px;margin-top:20px}
.stl:first-child{margin-top:0}
.sc2{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px}
.scl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.scv{font-family:'Cormorant Garamond',Georgia,serif;font-size:32px;font-weight:300;color:var(--text);line-height:1}
.scs{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px}
.sgr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.fla{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:.04em}
.fbt{width:80px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.fbf{height:100%;border-radius:2px;transition:width .6s ease}
.fnu{font-family:'DM Mono',monospace;font-size:10px;color:var(--dim);width:20px;text-align:right;flex-shrink:0}
.eb2{width:100%;padding:13px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.ccf{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.cci{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:10px 12px;outline:none;width:100%}
.cci::placeholder{color:var(--dim);font-style:italic}
.ccs{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:10px 12px;outline:none;appearance:none;width:100%;color-scheme:dark}
body.light .ccs{color-scheme:light}
.ccb{padding:11px;border-radius:6px;border:none;background:var(--a);color:#0c0b09;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
.ccl{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.cci2{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px}
.cin2{font-size:12px;color:var(--text);flex:1}
.cdl{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 4px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.op{opacity:1;pointer-events:all}
.mb{background:var(--card);border:1px solid var(--bl);border-radius:16px 16px 0 0;padding:20px 20px 40px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s;-webkit-overflow-scrolling:touch;position:relative}
.mo.op .mb{transform:translateY(0)}
.mh{width:36px;height:4px;background:var(--bl);border-radius:2px;margin:0 auto 16px}
.mcl{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:20px;padding:4px 8px}
.mt{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.mg{font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.msl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;margin-top:14px}
.msl:first-of-type{margin-top:0}
.mtx{font-size:13px;color:var(--muted);line-height:1.7;font-weight:300}
.mex{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:13px;color:var(--text);line-height:1.6;background:var(--surface);border-left:2px solid var(--bl);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:5px;margin-bottom:4px}
.msc{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:14px;color:var(--ab);line-height:1.6;background:var(--ad);border-left:2px solid var(--am);padding:8px 12px;border-radius:0 4px 4px 0;margin-top:6px}
.ql-list{display:flex;flex-direction:column;gap:4px;max-height:45vh;overflow-y:auto;margin-bottom:12px}
.ql-gl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);padding:8px 0 4px}
.ql-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:6px;cursor:pointer;border:1px solid transparent;background:var(--surface);width:100%;text-align:left}
.ql-btn.on{border-style:solid}
.ql-btn-name{font-size:13px;color:var(--text);flex:1}
.ql-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ql-note{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;resize:none;outline:none;height:66px;line-height:1.5;margin-bottom:10px}
.ql-note::placeholder{color:var(--dim);font-style:italic}
.ql-sub{width:100%;padding:12px;border-radius:6px;border:none;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer}
.ql-sub.off{background:var(--border);color:var(--dim);cursor:not-allowed}
.tst{position:fixed;bottom:80px;left:16px;right:16px;background:var(--card);border:1px solid var(--bl);border-radius:8px;padding:12px 16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;z-index:9998;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;text-align:center}
.tst.on{opacity:1;transform:translateY(0)}
@media(min-width:768px){.hdr{padding:24px 32px 16px}.pg,.bnav{max-width:600px;margin:0 auto}.fab{right:20px}.tst{max-width:568px;left:50%;transform:translateX(-50%) translateY(8px)}.tst.on{transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-eye">Pattern log &middot; Private</div><div class="hdr-name">The Covert Narcissist</div></div>
  <div class="hdr-r">
    <div><div class="hdr-n" id="tc">0</div><div class="hdr-nl">entries</div></div>
    <button class="theme-btn" onclick="toggleTheme()">&#9788;</button>
  </div>
</div>

<div class="pg on" id="pg-log">
  <div class="srch"><input class="si" id="si" placeholder="Search entries..." oninput="fe()"><button class="sc-btn" onclick="cs()">x</button></div>
  <div class="dfb"><span class="dl">From</span><input type="date" class="di" id="df" onchange="fe()"><span class="dl">To</span><input type="date" class="di" id="dt" onchange="fe()"><button class="dc-btn" onclick="cd()">Clear</button></div>
  <div class="gb" id="gb"></div>
  <div class="msel-bar" id="msel-bar"><span class="msel-label" id="msel-label">0 selected</span><button class="msel-clear" onclick="clearMulti()">Clear selection</button></div>
  <div id="cats"></div>
  <div class="lfp">
    <div class="lfs" id="lfs">Select categories above</div>
    <div class="multi-chips" id="multi-chips"></div>
    <textarea class="ln" id="ln" placeholder="Note (optional)..."></textarea>
    <button class="lb off" id="lb" onclick="logIt()">Log it</button>
  </div>
  <div class="fhd"><span class="fl" id="fl">0 entries</span></div>
  <div id="feed"></div>
</div>

<div class="pg" id="pg-def">
  <div class="dsr"><input class="dsi" id="def-search" placeholder="Search definitions..." oninput="fd(this.value)"></div>
  <div id="defc"></div>
</div>

<div class="pg" id="pg-id">
  <div class="ip">
    <div class="il">Describe what happened</div>
    <textarea class="ita" id="ita" placeholder="Type what AN said or did in plain language..."></textarea>
    <button class="ibn" id="ibn" onclick="runId()">Identify behavior</button>
    <div id="idr"></div>
  </div>
</div>

<div class="pg" id="pg-hist">
  <div class="hist-top">
    <input class="si" id="hist-q" placeholder="Search history..." oninput="renderHistory()" style="width:100%">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span class="dl">From</span><input type="date" class="di" id="hist-df" onchange="renderHistory()">
      <span class="dl">To</span><input type="date" class="di" id="hist-dt" onchange="renderHistory()">
      <button class="dc-btn" onclick="clearHist()">Clear</button>
    </div>
    <button class="hist-sum-btn" onclick="genSummary()">Generate visit summary</button>
  </div>
  <div class="backlog-bar">
    <span class="backlog-label">Back-log to:</span>
    <input type="date" class="di" id="backlog-date">
    <button class="dc-btn" onclick="openBacklog()">+ Log entry</button>
  </div>
  <div id="histp"></div>
</div>

<div class="pg" id="pg-st"><div class="sp" id="stp"></div></div>

<nav class="bnav">
  <button class="nbt on" onclick="sw('log')" id="nb-log"><span class="ni">&#x1F4CB;</span>Log</button>
  <button class="nbt" onclick="sw('def')" id="nb-def"><span class="ni">&#x1F4D6;</span>Defs</button>
  <button class="nbt" onclick="sw('hist')" id="nb-hist"><span class="ni">&#x1F4C5;</span>History</button>
  <button class="nbt" onclick="sw('id')" id="nb-id"><span class="ni">&#x1F50D;</span>Identify</button>
  <button class="nbt" onclick="sw('st')" id="nb-st"><span class="ni">&#x1F4CA;</span>Stats</button>
</nav>

<button class="fab" id="fab" onclick="openQL()">+</button>

<div class="mo" id="mo" onclick="cmO(event)">
  <div class="mb"><div class="mh"></div><button class="mcl" onclick="closeM()">x</button><div id="mc"></div></div>
</div>
<div class="mo" id="ql-mo" onclick="cmQL(event)">
  <div class="mb"><div class="mh"></div><button class="mcl" onclick="closeQL()">x</button><div id="ql-mc"></div></div>
</div>

<div class="tst" id="tst"></div>

<script>
var GROUPS=[{id:'attention',name:'Attention & Centrality',c:1},{id:'hierarchy',name:'Hierarchy & Authority',c:2},{id:'credit',name:'Credit & Narrative Control',c:3},{id:'rejection',name:'Rejection & Withholding',c:4},{id:'deflection',name:'Deflection & Avoidance',c:5},{id:'hm',name:'HM-Specific',c:6},{id:'he',name:'HE-Specific',c:7},{id:'new',name:'With New People',c:8}];
var GC={1:'var(--g1)',2:'var(--g2)',3:'var(--g3)',4:'var(--g4)',5:'var(--g5)',6:'var(--g6)',7:'var(--g7)',8:'var(--g8)'};
var GCD={1:'var(--g1d)',2:'var(--g2d)',3:'var(--g3d)',4:'var(--g4d)',5:'var(--g5d)',6:'var(--g6d)',7:'var(--g7d)',8:'var(--g8d)'};
var GCM={1:'var(--g1m)',2:'var(--g2m)',3:'var(--g3m)',4:'var(--g4m)',5:'var(--g5m)',6:'var(--g6m)',7:'var(--g7m)',8:'var(--g8m)'};
function gc(n){return GC[n]||GC[1];}
function gcd(n){return GCD[n]||GCD[1];}
function gcm(n){return GCM[n]||GCM[1];}
function gColor(gid){var g=GROUPS.find(function(x){return x.id===gid;});return g?g.c:1;}
</script>
<script id="cats-data">
var CATS=[
  {id:'p-startle',g:'attention',l:'Performative startle',
   w:'A scream or startled reaction disproportionate to the actual stimulus. The room stops and reorganizes around her in under a second. Genuine startle scales with actual threat. This does not.',
   ex:['Someone walks into the room normally. She screams. Everyone rushes over.',
       'A door closes at normal volume. She jumps and grabs her chest dramatically.',
       'A dog barks once outside. She shrieks and makes everyone check on her.'],
   int:'You are not required to tend to it. Let others respond.',
   sc:['Let others respond. Keep your energy level.']},
  {id:'v-self',g:'attention',l:'Vulnerable self-presentation',
   w:'Strategic self-deprecation that bids for centrality. The self-criticism is the vehicle. The destination is the room reorganizing around her.',
   ex:['"Mine is probably not as good as yours - can you taste it and tell me what is wrong?"',
       '"I\'m probably the worst cook here. Everyone else is so talented."',
       '"I don\'t know why I even try. I always do this wrong."'],
   int:'You are not obligated to be her evaluator. The humility is performed, not felt.',
   sc:['"I\'m sure it\'s good." (warm, closed)','"I\'ll have to try it another time."']},
  {id:'cap-aud',g:'attention',l:'Captive audience enforcement',
   w:'Delivers monologues and punishes interruption with guilt or withdrawal. Includes narrating something as funny that is not - requiring the room to perform amusement on her behalf.',
   ex:['"I guess you don\'t care about what I\'m saying." After someone adds a normal comment mid-story.',
       'Tells a story about a minor inconvenience, laughing throughout, and waits for the room to laugh.',
       '"Nobody ever lets me finish." Said after being asked a clarifying question.'],
   int:'This is not a conversation. It is a performance with a required audience.',
   sc:['Let her finish. Do not fill the silence after. Do not over-validate.']},
  {id:'con-int',g:'attention',l:'Connection interception',
   w:'Inserts herself verbally or physically into moments when AA and HM are most connected. Also includes positioning herself between HM and whatever has captured his attention - blocking his line of sight or physical access to the moment.',
   ex:['AA and HM are laughing together. She calls his name, needs something, introduces a topic.',
       'HM is watching something on TV. She walks in front of the screen and starts talking.',
       'HM is engaged in a conversation with a guest. She physically steps between them.'],
   int:'This is responsive, not random. She felt the connection and moved toward it. Finish your moment before orienting to her.',
   sc:['Slow your response time. Do not abandon the connection immediately.']},
  {id:'att-rec',g:'attention',l:'Attention reclamation',
   w:'Redirects focus back to herself when someone else is receiving strong positive engagement from the room.',
   ex:['A guest is telling a great story and everyone is laughing. She finds a reason to speak.',
       'Someone compliments the host\'s cooking. She immediately mentions something she brought.',
       'A child is performing and getting attention. She comments on her own memory of that age.'],
   int:'She can share the room up to a threshold. Watch where that threshold is.',
   sc:['Let the other person\'s moment land fully. Do not help redirect.']},
  {id:'bib-auth',g:'attention',l:'Biblical/spiritual authority display',
   w:'References biblical knowledge or spiritual wisdom accumulated through suffering and age. The humility wrapper makes the authority claim unchallengeable.',
   ex:['"I have learned so much in my old age. God has shown me things through everything I have been through."',
       '"The Bible says... and I understand that now after all I\'ve experienced."',
       '"When you get to my age and have suffered like I have, you understand things differently."'],
   int:'The suffering is real. The deployment of it as authority is strategic.',
   sc:['"Mm." (receive it without expanding it)']},
  {id:'cvt-pos',g:'hierarchy',l:'Covert positioning',
   w:'Subtle hierarchy plays with plausible deniability. The move serves her positioning while leaving nothing to be held accountable for if named.',
   ex:['Offers help you did not ask for in a way that implies you needed it.',
       'Comments on something in your home as "interesting" with a tone that means "wrong."',
       'Directs a question to someone else about something you are clearly the expert on.'],
   int:'Name it internally. You do not have to respond to the surface. Respond to your own clarity.',
   sc:['Stay warm. Stay unbothered. No verbal response required.']},
  {id:'hie-res',g:'hierarchy',l:'Hierarchy reset via warmth',
   w:'Uses affectionate language to reestablish herself as the senior person in the room. The warmth is real but administered from above.',
   ex:['"Thanks kids." After a dinner you cooked in your home.',
       '"You two are doing so well." Said to a married couple in their own house.',
       '"Look at you all grown up." Said to a 35-year-old professional.'],
   int:'The warmth is real. The hierarchy move inside it is also real.',
   sc:['"Mmhm." (neutral acknowledgment)','Smile and redirect.']},
  {id:'ass-ign',g:'hierarchy',l:'Assumed ignorance projection',
   w:'Explains things as if it is everyone\'s first time hearing it because she did not know it, so no one could have known it before her.',
   ex:['Explains a basic cooking technique to a room of trained adults.',
       'Informs everyone how to drive a route they have all driven a hundred times.',
       'Describes a well-known historical fact as if she just discovered it.'],
   int:'Intellectual authority move dressed as sharing. You do not have to perform surprise.',
   sc:['"Yeah, I\'ve come across that." (matter of fact, no elaboration)']},
  {id:'rap-sta',g:'hierarchy',l:'Rapid status filing',
   w:'Establishes credentials or background early when meeting someone new. Files her position before the relationship can form organically.',
   ex:['Within five minutes: where she is from, her profession, her hardships, her accomplishments.',
       'Introduces herself by her credentials before her name.',
       'Immediately finds a way to establish she has more experience than the new person.'],
   int:'She needs the frame set before impressions form. That urgency is information.',
   sc:['No response required. Observe the sequence.']},
  {id:'sta-ass',g:'hierarchy',l:'Status assessment questioning',
   w:'Asks new people questions that are really hierarchy calculations disguised as interest. She is sorting, not connecting.',
   ex:['Job, family status, education, and background delivered quickly in early conversation.',
       '"And what do you do?" asked with a particular attentiveness to the answer.',
       'Warmth visibly adjusts after the answer - more or less depending on the rank.'],
   int:'Watch what shifts in her treatment of the person once the assessment lands.',
   sc:['Observe. Note what changes after she gets her data.']},
  {id:'cul-aut',g:'hierarchy',l:'Cultural authority positioning',
   w:'Positions herself as the most authentic cultural or linguistic authority when relevant. With AA she apologizes for Spanish. With new people she wields it.',
   ex:['Corrects a native speaker\'s pronunciation in front of others.',
       'References "authentic" regional knowledge to override someone else\'s experience.',
       'Uses language fluency as a credential to establish superiority in a group.'],
   int:'Same tool, different function depending on who gives her more leverage.',
   sc:['Speak Spanish naturally if it arises. You do not need to perform or hide fluency.']},
  {id:'uns-adv',g:'hierarchy',l:'Unsolicited advisory',
   w:'Volunteers opinions about your home or choices framed as helpful observation. An authority claim dressed as generosity.',
   ex:['"You know what would be really good here is..." in a space that is working fine.',
       '"Have you tried doing it this way?" about a method you have used successfully for years.',
       'Rearranges something in your kitchen while "just helping."'],
   int:'Your home is working fine. You did not ask.',
   sc:['"Mm, I\'ll keep that in mind." (warm, noncommittal, closed)','"We like it this way."']},
  {id:'rhe-q',g:'hierarchy',l:'Rhetorical questioning',
   w:'Asks questions she already knows the answer to. Used to test, display knowledge, or set up a correction.',
   ex:['Asks how you made something she watched you make start to finish.',
       '"Did you know that..." followed by information she clearly expects to be new.',
       'Asks about something she was told directly two days ago.'],
   int:'She is not asking. She is positioning. Answer plainly without over-explaining.',
   sc:['"Yes." / "No." / "Mm-hmm." (brief, warm, closed)']},
  {id:'dia-aut',g:'hierarchy',l:'Diagnostic authority',
   w:'Declares how someone feels or why, without confirmation. Supplies the cause and the diagnosis simultaneously, often implicating others in the same breath.',
   ex:['"He\'s not feeling well because of the butter." (2 tablespoons of butter.)',
       '"She\'s tired because you kept her up." Said to a partner without asking either person.',
       '"He\'s in a bad mood because of what happened earlier." Said before he has spoken a word.'],
   int:'She owns his inner experience and assigns cause without evidence.',
   sc:['No response required. Do not defend the butter.']},
  {id:'crd-red',g:'credit',l:'Credit redirection',
   w:'When AA receives direct praise she finds the seam to redirect it. Amplifies someone else\'s contribution without lying but by editorializing.',
   ex:['Guest praises the food. She immediately highlights the one dish someone else contributed.',
       'Employee gets complimented. Manager finds a way to mention the team\'s support.',
       'Child wins award. Parent redirects to "all the help they had."'],
   int:'HE gave you the credit. You do not need her co-sign.',
   sc:['Receive the original compliment fully. Do not look to her for validation.']},
  {id:'inf-app',g:'credit',l:'Information appropriation',
   w:'Retells your or HM\'s information as if she originated it. The source quietly shifts to her in the retelling.',
   ex:['You told her a fact last week. She shares it with others this week as her discovery.',
       'A recommendation you made gets retold as hers to a new audience.',
       'HM\'s story about his own life gets retold by her as if she is the narrator of his experience.'],
   int:'You know where it came from. That is enough.',
   sc:['Do not correct publicly. Log it.']},
  {id:'nar-rev',g:'credit',l:'Narrative revision',
   w:'Reframes outcomes she did not get so it sounds like the result was her preference all along.',
   ex:['A plan she pushed for did not happen. Later: "I actually thought the other way was better anyway."',
       'She did not get invited somewhere. Later: "I would not have wanted to go to that anyway."',
       'An idea she opposed succeeds. Later: "I always thought that could work."'],
   int:'You know what happened. The revision does not change it.',
   sc:['Hold the truth internally. Do not correct the record publicly.']},
  {id:'cur-nar',g:'credit',l:'Curated family narrative',
   w:'Presents the family in an image-managed way to new people. The story is controlled before they can form their own impressions.',
   ex:['Tells a new person about the family\'s closeness, accomplishments, and values with herself centrally positioned.',
       'Edits out conflict or struggle when describing the family to outsiders.',
       'Introduces family members in ways that reflect well on her specifically.'],
   int:'New people get the version she needs them to have. You know the fuller picture and you are not obligated to correct it publicly.',
   sc:['You do not have to manage or correct the narrative publicly.']},
  {id:'bck-hnd',g:'credit',l:'Backhanded compliment',
   w:'Praise with a quiet qualifier buried in it. The compliment is real enough to accept. The qualifier does damage underneath.',
   ex:['"I didn\'t know you could cook like this."',
       '"You look so good - I almost didn\'t recognize you."',
       '"This is actually really impressive for someone your age."'],
   int:'You can receive the compliment and release the qualifier.',
   sc:['"Thank you." (receive only the compliment, full stop)']},
  {id:'cmp-dis',g:'credit',l:'Comparative dismissal',
   w:'References how things were done better or differently elsewhere when something does not go her way.',
   ex:['"In Mexico City we always did it this way..."',
       '"My mother never would have done it like that."',
       '"Where I\'m from this is considered the proper way."'],
   int:'A verdict dressed as information.',
   sc:['"Mm, interesting." (flat, warm, noncommittal)','"We like how we do it."']},
  {id:'exc-app',g:'credit',l:'Excitement appropriation',
   w:'When someone else is excited, she cuts them off, briefly narrates their excitement as if she shares it, then pivots to herself as the main subject.',
   ex:['HE shares good news. She says "yes yes I know I love that" then talks about herself for three minutes.',
       'A guest shares an achievement. She immediately relates a similar achievement of her own.',
       'Someone describes a great experience. She interrupts to describe a similar one she had.'],
   int:'His excitement is real. She borrows it and reroutes it before he can finish having it. You do not have to fill the space she creates when she does this.',
   sc:['Let the excited person finish. Do not fill space she creates.']},
  {id:'wrm-dis',g:'rejection',l:'Warmth/distance switch',
   w:'Alternates closeness and coldness unpredictably. The warmth is never stable enough to fully trust. The distance is never speakable.',
   ex:['Warm and engaged at dinner. Noticeably cooler the next morning with no apparent trigger.',
       'Hugs you warmly on arrival. Barely acknowledges you two hours later.',
       'Initiates closeness. Then withdraws without explanation and acts as if nothing changed.'],
   int:'The warmth is real when it is there. So is the distance. Both are her regulation tools and neither is your responsibility to chase or fix. You can receive the warmth without depending on it.',
   sc:['Match warmth when present. Do not pursue it when it withdraws.']},
  {id:'wgt-sil',g:'rejection',l:'Weighted silence',
   w:'Goes quiet in a way that fills the room after not getting her way. The tell is whether it triggers someone else to repair.',
   ex:['A plan she wanted does not happen. She says nothing but the temperature in the room drops.',
       'Someone disagrees with her. She does not respond but her presence shifts noticeably.',
       'A decision is made without her input. She becomes very quiet and still.'],
   int:'The silence is designed to be felt by everyone in the room. You will feel it. That is the point. You are not the target and not the repair person. Watch who moves and what it costs them.',
   sc:['Do not fill the silence. Stay even.']},
  {id:'sub-pen',g:'rejection',l:'Subtle penalty withdrawal',
   w:'Becomes slightly less warm, slightly less engaged after not getting her way. A quiet consequence for whoever crossed her.',
   ex:['After being declined on something, she becomes measurably less present for the rest of the evening.',
       'Someone expresses an opinion she disagrees with. Her engagement drops a noticeable degree.',
       'A request is ignored. She responds to everyone else in the room but that person less.'],
   int:'The withdrawal is designed to create anxiety around her approval. You do not need it.',
   sc:['Stay even. Do not chase the warmth back.']},
  {id:'ref-rec',g:'rejection',l:'Refusal to receive',
   w:'Consistently declines what AA specifically offers while sourcing or accepting the same things from elsewhere. Avoids being placed in a position of gratitude toward AA in AA\'s own home.',
   ex:['Declines offered fruit. Buys a large quantity of the same fruit independently. Declines the prepared fruit dessert.',
       'Refuses offered coffee. Brought her own French press and makes her own.',
       'Declines a seat at the table you set. Rearranges to sit where she prefers.'],
   int:'She did not want the thing. She wanted to not receive it from you.',
   sc:['Offer once, warmly. Let it go after.']},
  {id:'bod-sur',g:'rejection',l:'Body surveillance',
   w:'Comments on or monitors what AA eats, drinks, or how much. Makes you self-conscious at your own table in your own home.',
   ex:['"Oh you\'re having another one?" said with a light tone.',
       '"Are you sure you want that?" about food you are eating in your own kitchen.',
       'A noticeable glance at your plate followed by a comment about portions.'],
   int:'Your body, your table, your choices.',
   sc:['"I\'m good, thanks." (warm, closed)']},
  {id:'exc-spa',g:'rejection',l:'Exclusionary Spanish',
   w:'Speaks Spanish to create a moment of exclusion first, then performs the apology. The apology is the second half of the same move.',
   ex:['Says something clearly relevant to the room in Spanish. Then: "Sorry, I don\'t know how to say that in English."',
       'Has a side conversation in Spanish in a mixed group then performs regret about it.',
       'Uses the language shift as a way to signal a boundary before apologizing for it.'],
   int:'The exclusion came first. The apology is the cover.',
   sc:['Respond in Spanish if you choose. Or let it go.']},
  {id:'spa-apo',g:'rejection',l:'Spanish apology',
   w:'After six years of correction, still apologizes for speaking Spanish to AA. The apology is not about uncertainty - it restates a version of AA she prefers.',
   ex:['"Sorry Abri, I said that in Spanish - I don\'t know how to say all that in English."',
       'Six years of the same apology after six years of the same correction.',
       'Apologizes for a language AA has already confirmed she understands fluently.'],
   int:'This is a narrative she maintains, not a memory lapse.',
   sc:['"All good." (flat, warm, move on)','"I understood." (direct, no elaboration)']},
  {id:'str-omi',g:'rejection',l:'Strategic omission',
   w:'Goes noticeably quiet or skirts around a specific topic or person when they are introduced into conversation.',
   ex:['AA mentions her mom. AN goes quiet or quickly redirects.',
       'A topic that positions AA favorably comes up. She changes the subject.',
       'Someone brings up AA\'s accomplishments. She finds a reason to shift the focus.'],
   int:'The silence around certain people or topics is information.',
   sc:['You can mention your mom as often as you want. Watch what she does with it.']},
  {id:'non-apo',g:'deflection',l:'Non-apology apology',
   w:'"I\'m sorry you felt that way." The form of an apology without the substance. Responsibility quietly transferred outward.',
   ex:['"I\'m sorry, I was just trying to help."',
       '"I\'m sorry you took it that way - I didn\'t mean anything by it."',
       '"I\'m sorry if I upset you." (No acknowledgment of what actually happened.)'],
   int:'A real apology contains accountability. This contains an explanation.',
   sc:['"Mm." (receive without validating it as a full apology)','Do not say it\'s okay if it was not okay.']},
  {id:'his-gri',g:'deflection',l:'Historical grievance deflection',
   w:'Surfaces an unrelated past event when something in the present does not go her way.',
   ex:['Current issue comes up. Suddenly a thing from two years ago is on the table.',
       'A reasonable request is made. She responds with something that happened last Christmas.',
       'A direct question is asked. The answer involves relitigating something from a different year.'],
   int:'The deflection puts everyone on defense. You do not have to litigate the past.',
   sc:['"That\'s a separate conversation." (calm, warm, firm)','Or do not engage the historical thread at all. Silence is a complete answer.']},
  {id:'nvb-edi',g:'deflection',l:'Nonverbal editorializing',
   w:'A breath, a small sound, a quiet expression that communicates displeasure without being speakable.',
   ex:['A decision is made she did not want. She says nothing but exhales audibly.',
       'Something is said she disagrees with. A small "mm" escapes.',
       'An outcome she did not want is announced. Her face does something brief that everyone catches.'],
   int:'You heard it. So did everyone. She knows that. That is why it works.',
   sc:['Do not respond to the sound. Continue as if it was not there.']},
  {id:'cvt-sur',g:'deflection',l:'Covert surveillance glance',
   w:'When she did not originate an idea she goes quiet, then glances at you when she thinks you cannot see. She is gathering data and recalibrating.',
   ex:['Someone else\'s idea gets a strong reaction. She goes quiet. Then the glance toward you.',
       'You say something that lands well. A quick look to see how you received the response.',
       'A plan proceeds without her input. She observes silently and tracks reactions.'],
   int:'The silence is not disengagement. She is highly active behind it. Tracking. Calculating. Your job is to stay natural and not signal that you caught it. The glance is information about how closely she is monitoring the room.',
   sc:['Stay natural. Do not signal you caught it. Log it.']},
  {id:'img-rep',g:'deflection',l:'Image repair via generosity',
   w:'Overcorrects into visible warmth or generosity immediately after showing displeasure. Overwrites the moment so the room\'s last memory is warmth.',
   ex:['She was clearly off for twenty minutes. Then: sudden warmth, a generous gesture.',
       'After a tense moment she appears with food or a gift.',
       'Following visible irritation she becomes performatively kind to the exact person she was cold toward.'],
   int:'The generosity is for the room\'s perception of her, not for you.',
   sc:['Receive it warmly. Do not match the elevated energy. Stay even.']},
  {id:'he-tri',g:'deflection',l:'HE triangulation',
   w:'Pulls HE in as an indirect witness or validator when she does not get her way.',
   ex:['Something does not go her way. She makes a comment to HE that recruits him as witness.',
       'A disagreement happens. She tells HE about it in a way that positions her favorably.',
       'She gives HE a look that communicates her displeasure without saying anything to the room.'],
   int:'This is not your conflict to manage.',
   sc:['Do not insert yourself. Let HE navigate his own lane.']},
  {id:'prf-acc',g:'deflection',l:'Performed acceptance',
