<script>
var SEC_OPEN={};
GROUPS.forEach(function(g){SEC_OPEN[g.id]=true;});
var ALERT_THRESHOLD=10;
var _qlSel=null;
var _blSel=[];

var state={sel:[],fgrp:null,q:'',df:'',dt:'',editing:null,entries:[],custom:[],catNotes:{},theme:'auto'};

function save(){
  try{
    var ed=JSON.stringify(state.entries);
    var cd=JSON.stringify(state.custom);
    var nd=JSON.stringify(state.catNotes);
    localStorage.setItem('tcn5',ed);localStorage.setItem('tcn5c',cd);localStorage.setItem('tcn5n',nd);localStorage.setItem('tcn5t',state.theme);
    sessionStorage.setItem('tcn5',ed);sessionStorage.setItem('tcn5c',cd);
  }catch(e){console.log('save err',e);}
}
function load(){
  try{var e=localStorage.getItem('tcn5')||sessionStorage.getItem('tcn5');if(e)state.entries=JSON.parse(e);}catch(e){}
  try{var c=localStorage.getItem('tcn5c')||sessionStorage.getItem('tcn5c');if(c)state.custom=JSON.parse(c);}catch(e){}
  try{var n=localStorage.getItem('tcn5n');if(n)state.catNotes=JSON.parse(n);}catch(e){}
  try{var t=localStorage.getItem('tcn5t');if(t)state.theme=t;}catch(e){}
}
function allCats(){return CATS.concat(state.custom);}

function applyTheme(){
  if(state.theme==='light'){document.body.classList.add('light');}
  else if(state.theme==='dark'){document.body.classList.remove('light');}
  else{var d=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;if(d)document.body.classList.remove('light');else document.body.classList.add('light');}
}
function toggleTheme(){state.theme=document.body.classList.contains('light')?'dark':'light';applyTheme();save();}

function sw(p){
  document.querySelectorAll('.pg').forEach(function(x){x.classList.remove('on');});
  document.querySelectorAll('.nbt').forEach(function(x){x.classList.remove('on');});
  var pg=document.getElementById('pg-'+p);var nb=document.getElementById('nb-'+p);
  if(pg)pg.classList.add('on');if(nb)nb.classList.add('on');
  if(p==='st')renderStats();if(p==='def')renderDefs('');if(p==='hist')renderHistory();if(p==='gl')renderGlossary();
  var fab=document.getElementById('fab');if(fab)fab.style.display=(p==='log')?'flex':'none';
  window.scrollTo(0,0);
}

function alertCounts(){
  var today=new Date().toDateString();var counts={};
  state.entries.forEach(function(e){if(!e.isSummary&&new Date(e.ts).toDateString()===today){counts[e.cid]=(counts[e.cid]||0)+1;}});
  return counts;
}

function rGB(){
  var bar=document.getElementById('gb');if(!bar)return;
  var h='';
  var allStyle=!state.fgrp?'background:'+gc(1)+';color:#0c0b09;border-color:'+gc(1):'';
  h+='<button class="gc2" style="'+allStyle+'" onclick="setFG(null)">All</button>';
  GROUPS.forEach(function(g){
    var on=state.fgrp===g.id;
    var st=on?'background:'+gc(g.c)+';color:#0c0b09;border-color:'+gc(g.c):'';
    h+='<button class="gc2" style="'+st+'" onclick="setFG(this)" data-gid="'+g.id+'">'+g.name+'</button>';
  });
  bar.innerHTML=h;
}

function setFG(btn){
  var gid=btn?btn.getAttribute('data-gid'):null;
  state.fgrp=gid;state.sel=[];rGB();rCats();uForm();
}

function clearMulti(){state.sel=[];rCats();uForm();}

function rCats(){
  var el=document.getElementById('cats');if(!el)return;
  var groups=state.fgrp?GROUPS.filter(function(g){return g.id===state.fgrp;}):GROUPS;
  var ac=alertCounts();
  var h='';
  groups.forEach(function(g){
    var col=g.c;
    var cats=allCats().filter(function(c){return c.g===g.id;});
    var cnt=state.entries.filter(function(e){return e.grp===g.id;}).length;
    var op=SEC_OPEN[g.id]!==false;
    h+='<div class="cs">';
    h+='<div class="csh" onclick="togSec(this)" data-gid="'+g.id+'">';
    h+='<div class="csd" style="background:'+gc(col)+'"></div>';
    h+='<span class="csn" style="color:'+gc(col)+'">'+g.name+'</span>';
    h+='<span class="csc" style="color:'+gc(col)+'">'+cnt+'</span>';
    h+='<span class="cst'+(op?' op':'')+'">v</span></div>';
    h+='<div class="cg" style="max-height:'+(op?'3000px':'0px')+'">';
    cats.forEach(function(cat){
      var count=state.entries.filter(function(e){return e.cid===cat.id;}).length;
      var isSel=state.sel.indexOf(cat.id)!==-1;
      var bg=isSel?'background:'+gcd(col)+';border-color:'+gcm(col)+';border-style:dashed':'';
      var alertCnt=ac[cat.id]||0;
      var isHot=alertCnt>=ALERT_THRESHOLD;
      h+='<div class="ci" style="'+bg+'" onclick="selCat(this)" data-cid="'+cat.id+'">';
      h+='<span class="cin">'+cat.l+'</span>';
      h+='<span class="cic" style="color:'+(count>0?gc(col):'var(--dim)')+'>'+(count||'-')+'</span>';
      if(isHot)h+='<span class="badge">'+alertCnt+'x</span>';
      h+='<button class="cii" onclick="event.stopPropagation();openM(this)" data-cid="'+cat.id+'">i</button>';
      h+='</div>';
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
  var mbar=document.getElementById('msel-bar');
  var mlabel=document.getElementById('msel-label');
  if(mbar)mbar.classList.toggle('on',state.sel.length>0);
  if(mlabel)mlabel.textContent=state.sel.length+' selected';
}

function togSec(el){
  var gid=el.getAttribute('data-gid');
  SEC_OPEN[gid]=SEC_OPEN[gid]===false?true:false;
  rCats();
}

function selCat(el){
  var id=el.getAttribute('data-cid');
  var idx=state.sel.indexOf(id);
  if(idx===-1)state.sel.push(id);else state.sel.splice(idx,1);
  rCats();uForm();
}

function uForm(){
  var s=document.getElementById('lfs');var b=document.getElementById('lb');var chips=document.getElementById('multi-chips');
  if(!s||!b)return;
  if(state.sel.length>0){
    var firstCat=allCats().find(function(c){return c.id===state.sel[0];});
    var col=firstCat?gColor(firstCat.g):1;
    s.textContent=state.sel.length===1?firstCat.l:state.sel.length+' categories selected';
    s.style.color=gc(col);b.className='lb';b.style.background=gc(col);b.style.color='#0c0b09';
    if(chips){
      var ch='';
      state.sel.forEach(function(cid){
        var cat=allCats().find(function(c){return c.id===cid;});if(!cat)return;
        var c=gColor(cat.g);
        ch+='<span class="mchip" style="background:'+gcd(c)+';color:'+gc(c)+';border:1px solid '+gcm(c)+'">'+cat.l+'<button class="mchip-x" onclick="removeSel(this)" data-cid="'+cid+'">x</button></span>';
      });
      chips.innerHTML=ch;
    }
  }else{
    s.textContent='Select categories above';s.style.color='var(--dim)';
    b.className='lb off';b.style.background='';b.style.color='';
    if(chips)chips.innerHTML='';
  }
}

function removeSel(el){
  var id=el.getAttribute('data-cid');
  var idx=state.sel.indexOf(id);if(idx!==-1)state.sel.splice(idx,1);
  rCats();uForm();
}

function logIt(){
  if(state.sel.length===0)return;
  var note=document.getElementById('ln').value.trim();
  var ts=new Date().toISOString();
  state.sel.forEach(function(cid){
    var cat=allCats().find(function(c){return c.id===cid;});if(!cat)return;
    var g=GROUPS.find(function(x){return x.id===cat.g;});
    state.entries.unshift({id:Date.now()+Math.random(),cid:cat.id,cl:cat.l,grp:cat.g,gn:g?g.name:cat.g,note:note,ts:ts});
  });
  document.getElementById('ln').value='';state.sel=[];
  save();rAll();toast('Logged.');
  setTimeout(function(){var feed=document.getElementById('feed');if(feed)feed.scrollIntoView({behavior:'smooth',block:'start'});},150);
}

function delEntry(el){
  var id=parseFloat(el.getAttribute('data-id'));
  state.entries=state.entries.filter(function(e){return e.id!==id;});
  save();rAll();toast('Removed.');
}
function startEdit(el){
  var id=parseFloat(el.getAttribute('data-id'));
  state.editing=id;rFeed();
}
function saveEdit(el){
  var id=parseFloat(el.getAttribute('data-id'));
  var ta=document.getElementById('ee-'+id);if(!ta)return;
  state.entries=state.entries.map(function(e){return e.id===id?Object.assign({},e,{note:ta.value.trim()}):e;});
  state.editing=null;save();rFeed();toast('Updated.');
}

function fe(){state.q=document.getElementById('si').value.toLowerCase();state.df=document.getElementById('df').value;state.dt=document.getElementById('dt').value;rFeed();}
function cs(){document.getElementById('si').value='';state.q='';rFeed();}
function cd(){document.getElementById('df').value='';document.getElementById('dt').value='';state.df='';state.dt='';rFeed();}

function getFE(){
  return state.entries.filter(function(e){
    if(e.isSummary)return false;
    if(state.fgrp&&e.grp!==state.fgrp)return false;
    if(state.q){var _q=state.q.toLowerCase();if(!e.cl.toLowerCase().includes(_q)&&!(e.note||'').toLowerCase().includes(_q)&&!e.gn.toLowerCase().includes(_q))return false;}
    if(state.df&&new Date(e.ts)<new Date(state.df))return false;
    if(state.dt){var t=new Date(state.dt);t.setHours(23,59,59);if(new Date(e.ts)>t)return false;}
    return true;
  });
}

function rFeed(){
  var entries=getFE();
  var tc=document.getElementById('tc');var fl=document.getElementById('fl');
  if(tc)tc.textContent=state.entries.filter(function(e){return !e.isSummary;}).length;
  if(fl)fl.textContent=entries.length+' entr'+(entries.length===1?'y':'ies');
  var feed=document.getElementById('feed');if(!feed)return;
  if(entries.length===0){feed.innerHTML='<div class="emp">Nothing logged yet.</div>';return;}
  var h='';
  entries.forEach(function(e){
    var col=gColor(e.grp);
    var dt=new Date(e.ts);
    var tm=dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' - '+dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    var isEd=state.editing===e.id;
    h+='<div class="en"><div class="est" style="background:'+gc(col)+'"></div><div class="eb"><div class="et">';
    h+='<span class="eg" style="background:'+gcd(col)+';color:'+gc(col)+';border:1px solid '+gcm(col)+'">'+e.cl+'</span>';
    h+='<span class="egr">'+e.gn+'</span><span class="etm">'+tm+'</span></div>';
    if(!isEd&&e.note)h+='<div class="eno">'+e.note+'</div>';
    if(isEd)h+='<textarea class="een" id="ee-'+e.id+'" rows="3">'+e.note+'</textarea><button class="ees" onclick="saveEdit(this)" data-id="'+e.id+'">Save</button>';
    h+='</div><div class="ea"><button class="ebt" onclick="startEdit(this)" data-id="'+e.id+'">edit</button><button class="ebt del" onclick="delEntry(this)" data-id="'+e.id+'">x</button></div></div>';
  });
  feed.innerHTML=h;
}

function rAll(){rGB();rCats();rFeed();uForm();}

function openM(el){
  var catId=el.getAttribute('data-cid');
  var cat=allCats().find(function(c){return c.id===catId;});if(!cat)return;
  var col=gColor(cat.g);var g=GROUPS.find(function(x){return x.id===cat.g;});
  var savedNote=state.catNotes[catId]||'';
  var h='<div class="mt" style="color:'+gc(col)+'">'+cat.l+'</div>';
  h+='<div class="mg">'+(g?g.name:'')+'</div>';
  h+='<div class="msl">What this behavior is</div><div class="mtx">'+(cat.w||'')+'</div>';
  if(cat.ex&&cat.ex.length){h+='<div class="msl">Examples</div>';cat.ex.forEach(function(ex){h+='<div class="mex">'+ex+'</div>';});}
  h+='<div class="msl">Internal reminder</div><div class="mtx">'+(cat.int||'')+'</div>';
  if(cat.sc&&cat.sc.length){h+='<div class="msl">How to respond</div>';cat.sc.forEach(function(s){h+='<div class="msc">'+s+'</div>';});}
  h+='<div class="msl">Your notes</div><div class="cat-note-area">';
  h+='<textarea class="cat-note-ta" id="cat-note-ta" placeholder="Add your own notes about this pattern...">'+savedNote+'</textarea>';
  h+='<button class="cat-note-btn" onclick="saveCatNote(this)" data-cid="'+catId+'">Save note</button></div>';
  document.getElementById('mc').innerHTML=h;
  document.getElementById('mo').classList.add('op');
}
function saveCatNote(el){
  var catId=el.getAttribute('data-cid');
  var ta=document.getElementById('cat-note-ta');if(!ta)return;
  state.catNotes[catId]=ta.value.trim();save();toast('Note saved.');
}
function cmO(e){if(e.target===document.getElementById('mo'))closeM();}
function closeM(){document.getElementById('mo').classList.remove('op');}

function openQL(){
  var h='<div class="mt" style="color:var(--ab)">Quick Log</div><div class="mg">Select a category and add a note</div>';
  h+='<div class="ql-list">';
  GROUPS.forEach(function(g){
    var col=g.c;
    var cats=allCats().filter(function(c){return c.g===g.id;});
    h+='<div class="ql-gl" style="color:'+gc(col)+'">'+g.name+'</div>';
    cats.forEach(function(cat){
      h+='<button class="ql-btn" onclick="qlSel(this)" data-cid="'+cat.id+'" data-col="'+col+'" style="border-color:transparent">';
      h+='<div class="ql-dot" style="background:'+gc(col)+'"></div>';
      h+='<span class="ql-btn-name">'+cat.l+'</span></button>';
    });
  });
  h+='</div>';
  h+='<textarea class="ql-note" id="ql-note" placeholder="Note (optional)..."></textarea>';
  h+='<button class="ql-sub off" id="ql-sub" onclick="qlLog()">Log it</button>';
  _qlSel=null;
  document.getElementById('ql-mc').innerHTML=h;
  document.getElementById('ql-mo').classList.add('op');
}
function qlSel(el){
  _qlSel=el.getAttribute('data-cid');
  var col=el.getAttribute('data-col');
  document.querySelectorAll('.ql-btn').forEach(function(b){b.classList.remove('on');b.style.borderColor='transparent';b.style.background='var(--surface)';});
  el.classList.add('on');el.style.borderColor=gcm(parseInt(col));el.style.background=gcd(parseInt(col));
  var sub=document.getElementById('ql-sub');
  if(sub){sub.className='ql-sub';sub.style.background=gc(parseInt(col));sub.style.color='#0c0b09';}
}
function qlLog(){
  if(!_qlSel)return;
  var cat=allCats().find(function(c){return c.id===_qlSel;});if(!cat)return;
  var note=document.getElementById('ql-note').value.trim();
  var g=GROUPS.find(function(x){return x.id===cat.g;});
  state.entries.unshift({id:Date.now(),cid:cat.id,cl:cat.l,grp:cat.g,gn:g?g.name:cat.g,note:note,ts:new Date().toISOString()});
  _qlSel=null;closeQL();save();rAll();toast('Logged.');
}
function cmQL(e){if(e.target===document.getElementById('ql-mo'))closeQL();}
function closeQL(){document.getElementById('ql-mo').classList.remove('op');}

function renderDefs(q){
  var ql=(q||'').toLowerCase();var h='';

  // DISCLAIMER
  h+='<div style="background:var(--ad);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:20px;font-family:DM Mono,monospace;font-size:10px;color:var(--muted);line-height:1.7;letter-spacing:.03em">';
  h+='<div style="color:var(--ab);font-size:9px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px">Important</div>';
  h+='These definitions are for pattern recognition and personal clarity. Covert narcissistic behavior is not correctable through confrontation, explanation, or appeals to empathy. Research on narcissistic personality structure consistently shows that insight-based interventions are largely ineffective because the behavior serves a function the person is not motivated to relinquish. What you can change is your own response, your boundaries, and the degree to which the behavior has access to you. That is not a consolation. That is where the power is.</div>';

  // UNDERSTANDING NARCISSISTIC BEHAVIOR -- collapsible section
  h+='<div class="dc2" style="margin-bottom:20px">';
  h+='<div class="dch" onclick="togDef(this)" data-did="def-narc-understanding" style="background:var(--ad)">';
  h+='<div class="dcd" style="background:var(--g2)"></div>';
  h+='<span class="dcn" style="color:var(--fg)">Understanding narcissistic behavior</span>';
  h+='<span class="dct" id="ddt-narc-understanding">v</span></div>';
  h+='<div class="dcb" id="def-narc-understanding">';

  // What the research says
  h+='<div class="dc2" style="margin:0 0 12px 0">';
  h+='<div class="dch" onclick="togDef(this)" data-did="def-research-says" style="background:var(--surface)">';
  h+='<span class="dcn">What the research says</span><span class="dct" id="ddt-research-says">v</span></div>';
  h+='<div class="dcb" id="def-research-says">';
  h+='<div class="dtx" style="margin-bottom:10px">Narcissistic Personality Disorder has one of the lowest treatment response rates of any personality structure. This is not because people with NPD cannot change -- it is because the disorder itself impairs the insight and motivation required for change. The person would need to want to change, sustain that motivation through the discomfort of genuinely examining their behavior, and do so without the defensive collapse that typically terminates treatment.</div>';
  h+='<div class="dtx" style="margin-bottom:10px">For covert narcissism specifically, the prognosis is complicated by the fact that the person rarely identifies their behavior as problematic. The covert presentation allows them to maintain a self-concept of victim, misunderstood good person, or devoted family member -- which makes external motivation for change even harder to establish.</div>';
  h+='<div class="dtx">What this means practically: do not build your peace on the expectation that the narcissist will change. Build it on your own responses, your own clarity, and your relationship\'s capacity to be a protected space regardless of what is happening in their orbit. That is not resignation. That is accurate strategy.</div>';
  h+='</div></div>';

  // What happens when you confront or resist
  h+='<div class="dc2" style="margin:0">';
  h+='<div class="dch" onclick="togDef(this)" data-did="def-confront" style="background:var(--surface)">';
  h+='<span class="dcn">What happens when you confront or resist</span><span class="dct" id="ddt-confront">v</span></div>';
  h+='<div class="dcb" id="def-confront">';
  h+='<div class="dtx" style="margin-bottom:12px;font-style:italic;color:var(--muted)">This section is not to discourage you from protecting yourself. It is to help you anticipate what resistance looks like so you are not caught off guard.</div>';

  var resist=[

function genSummary(){
  var entries=state.entries.filter(function(e){return !e.isSummary;});
  if(entries.length===0){toast('No entries to summarize.');return;}
  var hq=(document.getElementById('hist-q')||{}).value||'';
  var hdf=(document.getElementById('hist-df')||{}).value||'';
  var hdt=(document.getElementById('hist-dt')||{}).value||'';
  var filtered=entries.filter(function(e){
    if(hq&&!e.cl.toLowerCase().includes(hq.toLowerCase())&&!(e.note||'').toLowerCase().includes(hq.toLowerCase()))return false;
    if(hdf&&new Date(e.ts)<new Date(hdf))return false;
    if(hdt){var t2=new Date(hdt);t2.setHours(23,59,59);if(new Date(e.ts)>t2)return false;}
    return true;
  });
  if(filtered.length===0){toast('No entries in current filter range.');return;}
  var dates=filtered.map(function(e){return new Date(e.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});});
  var uniqueDates=dates.filter(function(d,i){return dates.indexOf(d)===i;});
  var catCts={};var grpCts={};
  filtered.forEach(function(e){catCts[e.cid]=(catCts[e.cid]||0)+1;grpCts[e.grp]=(grpCts[e.grp]||0)+1;});
  var topCatId=null;var topCnt=0;Object.keys(catCts).forEach(function(k){if(catCts[k]>topCnt){topCnt=catCts[k];topCatId=k;}});
  var topCat=topCatId?allCats().find(function(c){return c.id===topCatId;}):null;
  var topGrpId=null;var topGrpCnt=0;Object.keys(grpCts).forEach(function(k){if(grpCts[k]>topGrpCnt){topGrpCnt=grpCts[k];topGrpId=k;}});
  var topGrp=topGrpId?GROUPS.find(function(g){return g.id===topGrpId;}):null;
  var now=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var lines=['VISIT SUMMARY','Generated: '+now,'','DATES: '+uniqueDates.join(', '),'TOTAL ENTRIES: '+filtered.length,'','TOP BEHAVIOR: '+(topCat?topCat.l+' ('+topCnt+'x)':'none'),'TOP GROUP: '+(topGrp?topGrp.name+' ('+topGrpCnt+'x)':'none'),'','BREAKDOWN BY GROUP:'];
  GROUPS.forEach(function(g){var cnt=grpCts[g.id]||0;if(cnt>0)lines.push('  '+g.name+': '+cnt);});
  lines.push('','BREAKDOWN BY BEHAVIOR:');
  var catArr=[];Object.keys(catCts).forEach(function(k){catArr.push([k,catCts[k]]);});catArr.sort(function(a,b){return b[1]-a[1];});
  catArr.forEach(function(r){var cat=allCats().find(function(c){return c.id===r[0];});if(cat)lines.push('  '+cat.l+': '+r[1]);});
  lines.push('','NOTES:');
  filtered.filter(function(e){return e.note;}).forEach(function(e){var d=new Date(e.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});lines.push('  ['+d+'] '+e.cl+': '+e.note);});
  var txt=lines.join('\n');
  state.entries.unshift({id:Date.now(),cid:'summary',cl:'Visit Summary',grp:'attention',gn:'Summary',note:txt,ts:new Date().toISOString(),isSummary:true});
  save();renderHistory();toast('Summary saved to History.');
}

function renderStats(){
  var all=state.entries.filter(function(e){return !e.isSummary;});
  var total=all.length;
  var today=new Date().toDateString();
  var todayCnt=all.filter(function(e){return new Date(e.ts).toDateString()===today;}).length;
  var wkCnt=all.filter(function(e){return(new Date()-new Date(e.ts))/(1000*60*60*24)<=7;}).length;
  var catCts={};all.forEach(function(e){catCts[e.cid]=(catCts[e.cid]||0)+1;});
  var catArr=[];Object.keys(catCts).forEach(function(k){catArr.push([k,catCts[k]]);});catArr.sort(function(a,b){return b[1]-a[1];});var topCats=catArr.slice(0,8);
  var grpCts={};all.forEach(function(e){grpCts[e.grp]=(grpCts[e.grp]||0)+1;});

  var topDay=null;var topDN=0;Object.keys(dayCts).forEach(function(k){if(dayCts[k]>topDN){topDN=dayCts[k];topDay=k;}});
  var h='<div class="stl">Overview</div>';

  if(topCats.length){
    h+='<div class="stl">Most frequent</div>';var mx=topCats[0][1];
    topCats.forEach(function(tc){var cat=allCats().find(function(c){return c.id===tc[0];});if(!cat)return;var col=gColor(cat.g);h+='<div class="fr"><div class="fd" style="background:'+gc(col)+'"></div><div class="fla">'+cat.l+'</div><div class="fbt"><div class="fbf" style="width:'+Math.round((tc[1]/mx)*100)+'%;background:'+gc(col)+'"></div></div><div class="fnu">'+tc[1]+'</div></div>';});
  }
  h+='<div class="stl">By group</div>';
  GROUPS.forEach(function(g){var cnt=grpCts[g.id]||0;h+='<div class="fr"><div class="fd" style="background:'+gc(g.c)+'"></div><div class="fla">'+g.name+'</div><div class="fbt"><div class="fbf" style="width:'+Math.round((cnt/gmx)*100)+'%;background:'+gc(g.c)+'"></div></div><div class="fnu">'+cnt+'</div></div>';});
  h+='<div class="stl">Export</div><button class="eb2" onclick="expJSON()">Download as JSON</button><button class="eb2" onclick="expCSV()">Download as CSV</button>';
  h+='<div class="stl">Import</div>';
  h+='<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--dim);letter-spacing:.08em;margin-bottom:8px">Import a JSON export from another device. Duplicates are skipped automatically.</div>';
  h+='<input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(this)">';
  h+='<button class="eb2" onclick="document.getElementById(\'import-file\').click()">Import from JSON</button>';
  h+='<div class="stl">Custom categories</div><div class="ccf">';h+='<input class="cci" id="ccn" placeholder="Category name (required)...">';h+='<select class="ccs" id="ccg">'+GROUPS.map(function(g){return'<option value="'+g.id+'">'+g.name+'</option>';}).join('')+'</select>';h+='<textarea class="cci" id="ccw" placeholder="What this behavior is..." style="height:60px;resize:vertical"></textarea>';h+='<textarea class="cci" id="ccex" placeholder="Example..." style="height:50px;resize:vertical"></textarea>';h+='<textarea class="cci" id="ccint" placeholder="Internal reminder..." style="height:50px;resize:vertical"></textarea>';h+='<textarea class="cci" id="ccsc" placeholder="How to respond..." style="height:50px;resize:vertical"></textarea>';h+='<textarea class="cci" id="cccor" placeholder="Beginning correction..." style="height:50px;resize:vertical"></textarea>';h+='<button class="ccb" onclick="addCC()">Add category</button></div>';
  if(state.custom.length){h+='<div class="ccl">';state.custom.forEach(function(c){h+='<div class="cci2"><span class="cin2">'+c.l+'</span><button class="cdl" onclick="delCC(this)" data-cid="'+c.id+'">x</button></div>';});h+='</div>';}
  var stp=document.getElementById('stp');if(stp)stp.innerHTML=h;
}

function addCC(){

  var w=document.getElementById('ccw')?document.getElementById('ccw').value.trim():'';
  var ex=document.getElementById('ccex')?document.getElementById('ccex').value.trim():'';
  var int2=document.getElementById('ccint')?document.getElementById('ccint').value.trim():'';
  var sc=document.getElementById('ccsc')?document.getElementById('ccsc').value.trim():'';
  var cor=document.getElementById('cccor')?document.getElementById('cccor').value.trim():'';
  var id='cc-'+Date.now();
  state.custom.push({id:id,g:g,l:n,w:w||'Custom category.',ex:ex||'',int:int2||'You defined this pattern.',sc:sc?[sc]:[],correction:cor||''});
  document.getElementById('ccn').value='';
  if(document.getElementById('ccw'))document.getElementById('ccw').value='';
  if(document.getElementById('ccex'))document.getElementById('ccex').value='';

  save();renderStats();rCats();toast('Category added.');

function delCC(el){
  var id=el.getAttribute('data-cid');
  state.custom=state.custom.filter(function(c){return c.id!==id;});save();renderStats();rCats();toast('Removed.');
}

function expJSON(){
  var d=JSON.stringify({entries:state.entries,exported:new Date().toISOString()},null,2);
  var b=new Blob([d],{type:'application/json'});var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download='tcn-export.json';a.click();URL.revokeObjectURL(u);
}
function expCSV(){
  var rows=[['Date','Time','Category','Group','Note']];
  state.entries.forEach(function(e){var dt=new Date(e.ts);rows.push([dt.toLocaleDateString('en-US'),dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),e.cl,e.gn,'"'+(e.note||'').replace(/"/g,'""')+'"']);});
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var b=new Blob([csv],{type:'text/csv'});var u=URL.createObjectURL(b);
  var a=document.createElement('a');a.href=u;a.download='tcn-export.csv';a.click();URL.revokeObjectURL(u);
}

function importJSON(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      var incoming=data.entries||[];
      if(!Array.isArray(incoming)||incoming.length===0){toast('No entries found in file.');return;}
      var existingIds=new Set(state.entries.map(function(e){return e.id;}));
      var added=0;
      incoming.forEach(function(en){
        if(!existingIds.has(en.id)){
          state.entries.push(en);
          existingIds.add(en.id);
          added++;
        }
      });
      state.entries.sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
      save();rAll();renderStats();
      toast('Imported '+added+' new entr'+(added===1?'y':'ies')+'.');
    }catch(err){toast('Could not read file. Make sure it is a valid JSON export.');}
    input.value='';
  };
  reader.readAsText(file);
}

function renderGlossary(){
  var glp=document.getElementById('glp');if(!glp)return;
  var GLOSS=[
    {t:'Complex PTSD (C-PTSD)',cat:'Trauma Responses',
     d:'A trauma response that develops from prolonged, repeated relational trauma rather than a single event. Unlike standard PTSD it is characterized by ongoing dysregulation across emotional, relational, identity, and somatic domains because the source of harm was a person and the exposure was sustained over time.',
     ex:'A person who grew up with a narcissistic parent may find themselves chronically on edge in relationships, unable to trust warmth when it is offered, prone to intense shame responses, and unsure of who they are outside of how they were defined by the person who harmed them.',
     cor:'Trauma-informed therapy is the primary pathway. EMDR, somatic therapy, and Internal Family Systems have strong evidence bases for C-PTSD specifically. The first step is often simply naming it -- understanding that what you are experiencing is a normal response to abnormal sustained conditions, not a character flaw.'},
    {t:'Hypervigilance',cat:'Trauma Responses',
     d:'A persistent state of elevated alertness and scanning for threat. The nervous system learned that danger could arrive at any time so it stays perpetually activated. In relational contexts it shows up as hypersensitivity to tone, energy shifts, facial expressions, and word choice.',
     ex:'Someone who grew up with an unpredictable narcissistic parent may find themselves constantly reading rooms, tracking other people\'s moods before engaging, and feeling exhausted by social situations because they are always monitoring for threat even when none is present.',
     cor:'Somatic practices that help the nervous system learn the current environment is safe -- breathwork, grounding, body-based therapy. The goal is not to eliminate awareness of others but to reduce the automatic threat response so reading the room becomes a choice rather than a compulsion.'},
    {t:'Trauma bonding',cat:'Trauma Responses',
     d:'A psychological attachment that forms under conditions of intermittent reward and punishment. The unpredictability of the narcissist\'s warmth and withdrawal creates a powerful attachment response. The brain becomes oriented toward pursuing the reward and tolerating the punishment to get it. Feels like love but is a survival adaptation.',
     ex:'A person in a relationship with a narcissistic partner may find themselves deeply attached despite consistent harm -- missing the person during withdrawals, feeling intensely connected during warm periods, and unable to leave even when they clearly see the pattern.',
     cor:'Understanding the neurological mechanism helps -- the intermittent reinforcement schedule is the same one that makes gambling addictive. Therapy focused on identifying the cycle, building support outside the relationship, and developing a coherent narrative of what is actually happening rather than what the warm periods promise.'},
    {t:'Freeze response',cat:'Trauma Responses',
     d:'One of the four primary trauma responses alongside fight, flight, and fawn. The nervous system becomes still, quiet, and internal as a survival strategy. In relational contexts it looks like going quiet, withdrawing into observation, becoming emotionally flat when threat is perceived.',
     ex:'In a room with a narcissistic person someone with a dominant freeze response may find themselves going quiet, becoming an observer, feeling disconnected from their own voice, and unable to access what they want to say until hours later when they are safe.',
     cor:'Learning to recognize the freeze as it is happening rather than after the fact. Somatic work to help the body find movement and voice when it wants to go still. Gradually practicing small verbal responses in low-stakes moments to rebuild the pathway between internal experience and external expression.'},
    {t:'Fawn response',cat:'Trauma Responses',
     d:'A trauma response where the person automatically appeases, accommodates, and prioritizes the comfort of a threatening person to avoid conflict or punishment. Developed as a survival strategy when fighting or fleeing were not viable options. Shows up as chronic people-pleasing and automatic accommodation.',
     ex:'A child of a narcissistic parent may grow into an adult who automatically agrees with people, apologizes reflexively, adjusts their behavior to manage others\' moods, and feels a sense of threat when someone around them is displeased even when that displeasure has nothing to do with them.',
     cor:'Learning to pause before automatic accommodation. Asking internally -- do I actually want to do this, or am I doing it to manage someone else\'s state? Beginning to tolerate the discomfort of not immediately appeasing. Small acts of non-accommodation in low-stakes situations build the muscle over time.'},
    {t:'Ego erosion',cat:'Identity and Self',
     d:'The gradual wearing down of a person\'s sense of self through sustained undermining, invalidation, criticism, and reframing. The person begins to doubt their own perceptions, preferences, competencies, and worth. Often so gradual it is not recognized until the person is far from who they used to be.',
     ex:'A person in a long-term relationship with a narcissistic partner may stop expressing opinions, stop pursuing interests that were not approved of, stop trusting their own judgment, and feel hollowed out -- unsure what they think or want independently.',
     cor:'Rebuilding self-knowledge through small consistent acts of self-referral. What do I think? What do I want? What do I notice? Journaling, therapy, and spending time with people who reflect your full self back to you rather than a diminished version.'},
    {t:'Identity diffusion',cat:'Identity and Self',
     d:'A loss of a clear, stable sense of who one is outside of the narcissist\'s definition. The person may not know their own opinions, preferences, values, or desires independently of what the narcissist approved of or needed them to be.',
     ex:'An adult who grew up as a golden child may excel at performing whatever role is needed but feel a persistent emptiness when alone -- unsure who they are when no one is watching or needing anything from them.',
     cor:'Identity work as a practice of curiosity. What do I notice I enjoy when no one is assigning meaning to it? What opinions arise in me before I edit them for an audience? Therapy focused on authentic self-expression and individuation.'},
    {t:'Scapegoating effects',cat:'Identity and Self',
     d:'Long-term psychological impacts of having been designated the identified problem person in a narcissistic family system. The scapegoat absorbs the family\'s projected dysfunction and internalizes a narrative of being inherently flawed or the cause of problems that were never theirs to carry.',
     ex:'An adult who was the family scapegoat may carry chronic shame, automatically assume blame in conflict, feel fundamentally defective, and struggle to believe that relationships are safe or that they deserve to be treated well.',
     cor:'Externalization -- learning to locate the dysfunction in the system rather than in the self. Therapy focused on shame reduction, accurate attribution of responsibility, and rebuilding a narrative of self that is not organized around being the problem.'},
    {t:'Golden child conditioning',cat:'Identity and Self',
     d:'The psychological impact of having been idealized and used as a narcissistic extension in a family system. The golden child\'s identity becomes organized around performance, achievement, and meeting the narcissist\'s needs. Worth feels contingent on continued excellence and approval.',
     ex:'An adult who was the golden child may be highly competent externally while feeling chronically anxious, unable to tolerate failure, uncertain about their own desires, and confused about why they feel empty despite achieving everything that was supposed to matter.',
     cor:'Separating worth from performance. Learning to exist and be loved outside of achievement contexts. Therapy focused on unconditional self-regard and building an identity not contingent on being exceptional.'},
    {t:'Parentification effects',cat:'Identity and Self',
     d:'Long-term consequences of having been placed in an emotional caretaking role for a parent during childhood. The parentified child learns their job is to manage the parent\'s emotional state and carries this role into adult relationships as a default orientation.',
     ex:'An adult who was parentified may automatically take responsibility for others\' emotional states, feel anxious when someone around them is unhappy, have difficulty being cared for without immediately reciprocating, and feel pervasive guilt about having their own needs.',
     cor:'Learning to locate responsibility accurately -- whose feelings are mine to manage and whose are not? Practicing receiving care without immediately deflecting. Therapy focused on the distinction between empathy and responsibility.'},
    {t:'Codependency',cat:'Relational Impacts',
     d:'A relational pattern where one person\'s sense of self, stability, and worth becomes organized around managing another person\'s emotions, needs, or behavior. The codependent person loses track of their own needs and identity in service of regulating the other.',
     ex:'A person in a codependent relationship may spend most of their mental energy anticipating the other person\'s moods, adjusting behavior to prevent conflict, and feeling responsible for outcomes that are not in their control.',
     cor:'Shifting focus from the other person\'s state to one\'s own. Regular self-check-ins. Gradually reducing accommodating behaviors. Codependents Anonymous and therapy focused on self-differentiation are both useful pathways.'},
    {t:'Anxious attachment',cat:'Relational Impacts',
     d:'An attachment style characterized by fear of abandonment, hypervigilance to relational signals, a tendency to seek reassurance, and difficulty tolerating distance or uncertainty in relationships.',
     ex:'A person with anxious attachment may constantly monitor their partner\'s mood for signs of withdrawal, need frequent reassurance, interpret normal distance as impending abandonment, and feel persistent low-grade anxiety that the relationship is about to end.',
     cor:'Identifying the pattern without shame -- it developed for a reason. Learning to self-soothe rather than seeking external reassurance as the primary regulation strategy. Therapy focused on building internal security.'},
    {t:'Betrayal trauma',cat:'Relational Impacts',
     d:'Trauma that occurs specifically when someone depended upon for safety, care, or protection causes harm. The betrayal by a trusted person creates a specific wound that affects the person\'s ability to trust, feel safe in relationships, and integrate the contradiction between who the person was supposed to be and what they actually did.',
     ex:'A person whose narcissistic parent consistently violated their trust may develop a deep difficulty trusting even safe relationships because the template for trusted people includes betrayal.',
     cor:'Distinguishing between the person who caused harm and people who are currently safe. Safe, consistent relationships and therapy focused on processing the original betrayal are both necessary.'},
    {t:'Hyperindependence',cat:'Relational Impacts',
     d:'An extreme self-reliance developed as a protective adaptation to having needs consistently unmet, punished, or exploited. The person learns that depending on others is dangerous and becomes rigidly self-sufficient.',
     ex:'A person raised by a narcissistic parent may become highly capable as an adult but find it nearly impossible to ask for help, accept support, or show vulnerability.',
     cor:'Small deliberate acts of allowing help. Choosing one safe person and practicing one act of vulnerability. Noticing the internal resistance -- the belief that needing anything makes you a burden or a target -- and working with that belief directly.'},
    {t:'Gaslighting effects',cat:'Cognitive and Perceptual',
     d:'The long-term perceptual and cognitive impacts of sustained gaslighting. Chronic self-doubt about one\'s own perceptions, memories, and interpretations develops as a direct result of someone repeatedly reframing reality.',
     ex:'A person who was consistently gaslit may preface accurate observations with "maybe I\'m wrong but..." or "I might be imagining this..." They may second-guess themselves so habitually that they cannot identify their own certainty.',
     cor:'Rebuilding trust in one\'s own perception through consistent self-validation. Keeping a record of observations so the pattern becomes visible over time. Therapy focused on reality testing and learning to distinguish between genuine uncertainty and conditioned self-doubt.'},
    {t:'Minimization habit',cat:'Cognitive and Perceptual',
     d:'A learned tendency to downplay one\'s own experience, needs, or pain -- developed as an adaptation to an environment where expressing needs was punished, ignored, or met with contempt.',
     ex:'"It wasn\'t that bad." "I\'m probably overreacting." "Other people have it worse." Said automatically before anyone has questioned whether the experience was valid.',
     cor:'Catching the minimization in real time. Before saying "it wasn\'t that bad" pausing to ask -- was it actually not that bad, or am I saying that because it feels safer than acknowledging how much it hurt?'},
    {t:'Over-explanation habit',cat:'Cognitive and Perceptual',
     d:'The tendency to justify, explain, and defend normal choices, feelings, and preferences -- developed in environments where everything required explanation to avoid punishment. The person carries the habit of justification into relationships where no one asked for a reason.',
     ex:'Someone asked what they want for dinner responds with a three-sentence explanation of why they want what they want, anticipating a challenge that was never coming.',
     cor:'Practicing plain statements without justification. "No thank you." is a complete sentence. Noticing when the explanation reflex activates and asking -- did anyone ask me to justify this?'},
    {t:'Apologizing reflex',cat:'Cognitive and Perceptual',
     d:'Automatic apologizing for existing, taking up space, having needs, or being perceived as an inconvenience. Developed in environments where the person\'s presence and needs were treated as burdens.',
     ex:'Apologizing when someone bumps into you. Apologizing before making a request. Apologizing for having an opinion. Apologizing for crying.',
     cor:'Replacing automatic apologies with neutral acknowledgments. "Excuse me" instead of "I\'m so sorry." Noticing when an apology is genuinely warranted versus when it is a reflex to preemptively manage someone else\'s potential displeasure.'},
    {t:'Reality testing impairment',cat:'Cognitive and Perceptual',
     d:'Difficulty knowing what is real, what is a reasonable response, and what is distortion -- developed through sustained exposure to a person who consistently reframed reality.',
     ex:'Something genuinely upsetting happens. The person\'s first response is not to feel upset but to audit whether they are allowed to feel upset before permitting themselves to have the feeling.',
     cor:'Learning to feel first and audit second. Allowing the initial response to exist before evaluating it. Therapy focused on validating and trusting one\'s own emotional responses as data rather than problems to be assessed for accuracy.'},
    {t:'Cognitive dissonance',cat:'Cognitive and Perceptual',
     d:'The persistent internal conflict between what one observes and what the narcissist\'s narrative insists should be observed. Living in sustained cognitive dissonance produces confusion, exhaustion, and a fragmented sense of reality.',
     ex:'Watching someone behave in a way that is clearly controlling while being told -- and half-believing -- that it is actually love and care. Knowing what you saw while simultaneously wondering if you invented it.',
     cor:'Naming the dissonance explicitly. "I observed X. I am being told X means Y. I do not believe that." Writing it down so the two versions exist in parallel and can be examined. Consistently trusting observation over narrative over time.'},
    {t:'People-pleasing compulsion',cat:'Behavioral and Somatic',
     d:'Chronic, automatic accommodation of others\' needs and preferences at the expense of one\'s own. Developed as a survival strategy in narcissistic environments where safety or approval depended on keeping others regulated.',
     ex:'Automatically agreeing with what others want before checking what you want. Feeling responsible for everyone\'s comfort in a room. Saying yes and feeling resentment later because the yes was not genuine.',
     cor:'Introducing a pause between the accommodation impulse and the response. "Let me think about that." buys time to check in before the automatic yes. Gradually building tolerance for disappointing people and surviving the discomfort of their reaction.'},
    {t:'Somatic symptoms',cat:'Behavioral and Somatic',
     d:'Physical manifestations of chronic relational stress and unprocessed trauma. The body absorbs what the mind adapts to. Common presentations include chronic tension, fatigue, digestive issues, headaches, immune dysregulation, and difficulty sleeping.',
     ex:'Someone in a long-term narcissistic relationship may experience persistent physical symptoms that have no clear medical cause -- chronic stomach problems, tension headaches, jaw clenching, or a persistent sense of physical heaviness.',
     cor:'Somatic therapy, body-based practices, and trauma-informed approaches that work directly with the body. Recognizing that physical symptoms may be the body\'s way of expressing what was not allowed to be expressed relationally.'},
    {t:'Emotional blunting',cat:'Behavioral and Somatic',
     d:'A reduction in the range or intensity of emotional experience developed as a protective adaptation to chronic emotional overwhelm, invalidation, or punishment. The person may feel numb, disconnected from their own emotional states, or unable to identify what they feel.',
     ex:'Something objectively significant happens -- good or bad -- and the person feels very little. Or they know intellectually they should feel something but cannot access the feeling.',
     cor:'Gradual safe exposure to emotional experience in therapeutic contexts. Somatic work to reconnect body sensation with feeling. Allowing small emotions to be felt fully without immediately managing or suppressing them.'},
    {t:'Identified patient',cat:'Family System',
     d:'In family systems theory, the person in the family who presents with symptoms -- anxiety, depression, behavioral problems -- that are actually expressions of the family system\'s dysfunction rather than individual pathology.',
     ex:'The child who acts out, the teenager who develops anxiety, the adult who struggles in relationships -- while the narcissistic parent is never identified as the source of the dysfunction.',
     cor:'Relocating the problem from the individual to the system. Understanding that the symptoms carried belong to the system, not to a deficiency in the individual. This reframe is often the beginning of significant relief.'},
    {t:'Flying monkeys',cat:'Family System',
     d:'People who, wittingly or not, act on behalf of the narcissist -- carrying messages, validating the narcissist\'s narrative, applying pressure to targets. May be conscious agents or genuinely conditioned believers in the narcissist\'s version of events.',
     ex:'A family member who calls to relay grievances. A mutual friend who repeats the narcissist\'s framing. Someone who pressures the target to apologize or comply.',
     cor:'Recognizing flying monkey behavior without necessarily assigning malicious intent. Not engaging with proxy communication -- "that\'s between me and them" redirects the message back to its source. Information shared with flying monkeys should be treated as information shared with the narcissist directly.'},
    {t:'Enablers',cat:'Family System',
     d:'People in the narcissist\'s orbit who facilitate the behavior through compliance, minimization, defense, or active participation. Enablers are not always aware of their role. Many are deeply conditioned themselves.',
     ex:'A partner who minimizes the narcissist\'s behavior to others. A family member who consistently explains away harmful patterns. A friend who tells the target they are overreacting.',
     cor:'For those impacted by enablers: not relying on them for validation, understanding that their minimization is a product of their own conditioning, and not over-investing in changing their perspective.'},
    {t:'Narcissistic family system',cat:'Family System',
     d:'A family organized around the needs, perceptions, and emotional regulation of a narcissistic central figure. All roles, relationships, and communication patterns are defined in relation to that person. Children typically take on defined roles -- golden child, scapegoat, lost child, or mascot.',
     ex:'A family where all conversations eventually center on one parent. Where that parent\'s mood sets the tone for every gathering. Where family members have learned their roles and perform them automatically.',
     cor:'Differentiation -- developing an identity and relational style that exists outside of the assigned role. This is slow work and often destabilizes the system before it stabilizes the individual.'},
    {t:'Triangulation effects',cat:'Family System',
     d:'Long-term relational impacts of having been consistently triangulated in family communication. The person develops hyperawareness of relational dynamics, difficulty with direct communication, and anxiety about being caught between people.',
     ex:'An adult who was consistently triangulated as a child may find themselves automatically mediating between people, reluctant to speak directly about conflict, and hyperaware of loyalty dynamics in groups.',
     cor:'Practicing direct communication -- speaking to the person the message is for rather than through intermediaries. Recognizing that being direct is not the same as being disloyal.'},
    {t:'Enmeshment legacy',cat:'Family System',
     d:'The long-term difficulty with individuation, boundaries, and emotional separateness that develops from growing up in an enmeshed family system. Adults from enmeshed families may struggle to know where they end and others begin.',
     ex:'An adult from an enmeshed family may feel responsible for their parent\'s emotional state even while living independently, feel guilty for making autonomous choices, and experience differentiation as a form of betrayal.',
     cor:'Individuation work -- developing a relationship with one\'s own thoughts, feelings, and preferences that exists independently of the family. Learning to tolerate the guilt that comes with differentiation without treating it as a signal that something is wrong.'},
    {t:'Narcissistic abuse syndrome',cat:'Family System',
     d:'An informal but clinically recognized constellation of symptoms that develops specifically from sustained narcissistic abuse. Includes hypervigilance, chronic self-doubt, emotional dysregulation, trauma bonding, identity confusion, and people-pleasing compulsion. Not yet a formal DSM diagnosis but increasingly recognized in trauma-informed clinical literature.',
     ex:'A person who has been in a long-term relationship with a narcissist may present with a recognizable cluster: they doubt themselves constantly, they are exhausted from monitoring others, they feel responsible for things outside their control, and they often do not identify what happened to them as abuse because it was so gradual and normalized.',
     cor:'Naming it is the first and often most significant step. Understanding that the cluster of symptoms has a coherent cause rather than representing personal deficiency. Trauma-informed therapy, connection with others who have similar experiences, and gradual rebuilding of self-trust over time.'}
  ];

  h+='<div style="font-family:DM Mono,monospace;font-size:10px;color:var(--muted);line-height:1.6;padding:0 16px 16px">Terms commonly associated with narcissistic relationship dynamics. General definitions with examples and beginning correction pathways.</div>';

      h+='<div class="dcb" id="'+gid+'">';
      h+='<div class="dsl">Definition</div><div class="dtx">'+item.d+'</div>';
      h+='<div class="dsl">Example</div><div class="dtx" style="font-style:italic;color:var(--muted)">'+item.ex+'</div>';
      h+='<div class="dsl">Beginning correction</div><div class="dtx" style="color:var(--g3)">'+item.cor+'</div>';
      h+='</div></div>';
    });
  });
  h+='</div>';
  glp.innerHTML=h;
}


function renderGlossary(){
  var TERMS=[
    {t:'Complex PTSD (C-PTSD)',d:'A trauma response that develops from prolonged, repeated relational trauma rather than a single event. Characterized by ongoing dysregulation across emotional, relational, identity, and somatic domains because the source of harm was a person and the exposure was sustained over time.',e:'A person who grew up with a narcissistic parent may find themselves chronically on edge in relationships, unable to trust warmth when it is offered, prone to intense shame responses, and unsure of who they are outside of how they were defined by the person who harmed them.',c:'Trauma-informed therapy is the primary pathway. EMDR, somatic therapy, and IFS have strong evidence bases. The first step is often naming it -- understanding that what you are experiencing is a normal response to abnormal sustained conditions, not a character flaw.'},
    {t:'Hypervigilance',d:'A persistent state of elevated alertness and scanning for threat. The nervous system learned that danger could arrive at any time, so it stays perpetually activated. Shows up as hypersensitivity to tone, energy shifts, facial expressions, and word choice.',e:'Someone who grew up with an unpredictable narcissistic parent may find themselves constantly reading rooms, tracking others\' moods before engaging, and feeling exhausted by social situations because they are always monitoring for threat even when none is present.',c:'Somatic practices that help the nervous system learn the current environment is safe -- breathwork, grounding, body-based therapy. The goal is not to eliminate awareness of others but to reduce the automatic threat response so reading the room becomes a choice rather than a compulsion.'},
    {t:'Trauma bonding',d:'A psychological attachment that forms under conditions of intermittent reward and punishment. The unpredictability of the narcissist\'s warmth and withdrawal creates a powerful attachment -- the brain becomes oriented toward pursuing the reward and tolerating the punishment. Feels like love but is a survival adaptation.',e:'A person in a relationship with a narcissistic partner may find themselves deeply attached despite consistent harm -- missing the person during withdrawals, feeling intensely connected during warm periods, and unable to leave even when they clearly see the pattern.',c:'Understanding the neurological mechanism helps -- the intermittent reinforcement schedule is the same one that makes gambling addictive. Therapy focused on identifying and naming the cycle, building a support system outside the relationship, and developing a coherent narrative of what is actually happening.'},
    {t:'Freeze response',d:'One of the four primary trauma responses alongside fight, flight, and fawn. The nervous system becomes still, quiet, and internal as a survival strategy. In relational contexts it looks like going quiet, withdrawing into observation, becoming emotionally flat when threat is perceived.',e:'In a room with a narcissistic person, someone with a dominant freeze response may go quiet, become an observer rather than a participant, feel disconnected from their own voice, and be unable to access what they want to say until hours later when they are safe.',c:'Learning to recognize the freeze as it is happening rather than after the fact. Somatic work to help the body find movement and voice when it wants to go still. Gradually practicing small verbal responses in low-stakes moments to rebuild the pathway between internal experience and external expression.'},
    {t:'Fawn response',d:'A trauma response where the person automatically appeases, accommodates, and prioritizes the comfort of a threatening person to avoid conflict or punishment. Developed as a survival strategy when fighting or fleeing were not viable options. Shows up as chronic people-pleasing and automatic accommodation.',e:'A child of a narcissistic parent may grow into an adult who automatically agrees with people, apologizes reflexively, adjusts their behavior to manage others\' moods, and feels a sense of threat when someone around them is displeased -- even when that displeasure has nothing to do with them.',c:'Learning to pause before automatic accommodation. Asking internally -- do I actually want to do this, or am I doing it to manage someone else\'s state? Small acts of non-accommodation in low-stakes situations build the muscle over time.'},
    {t:'Ego erosion',d:'The gradual wearing down of a person\'s sense of self through sustained undermining, invalidation, criticism, and reframing. The person begins to doubt their own perceptions, preferences, competencies, and worth. Often so gradual it is not recognized until the person is far from who they used to be.',e:'A person in a long-term relationship with a narcissistic partner may stop expressing opinions, stop pursuing interests that were not approved of, stop trusting their own judgment, and feel hollowed out -- unsure what they actually think or want independent of the relationship.',c:'Rebuilding self-knowledge through small, consistent acts of self-referral. What do I think? What do I want? What do I notice? Journaling, therapy, and spending time with people who reflect your full self back to you. Recovery from ego erosion is slow because what was lost was built slowly.'},
    {t:'Identity diffusion',d:'A loss of a clear, stable sense of who one is outside of the narcissist\'s definition. The person may not know their own opinions, preferences, values, or desires independent of what the narcissist approved of or needed them to be.',e:'An adult who grew up as a golden child may excel at performing whatever role is needed but feel a persistent emptiness when alone -- unsure who they are when no one is watching or needing anything from them.',c:'Identity work as a practice of curiosity. What do I notice I enjoy when no one is assigning meaning to it? What opinions arise in me before I edit them? Therapy focused on authentic self-expression and individuation.'},
    {t:'Scapegoating effects',d:'Long-term psychological impacts of having been designated the identified problem person in a narcissistic family system. The scapegoat absorbs the family\'s projected dysfunction and internalizes a narrative of being inherently flawed or the cause of problems that were never theirs to carry.',e:'An adult who was the family scapegoat may carry chronic shame, automatically assume blame in conflict, feel fundamentally defective in ways they cannot articulate, and struggle to believe that relationships are safe or that they deserve to be treated well.',c:'Externalization -- learning to locate the dysfunction in the system rather than in the self. Therapy focused on shame reduction, accurate attribution of responsibility, and rebuilding a narrative of self that is not organized around being the problem.'},
    {t:'Golden child conditioning',d:'The psychological impact of having been idealized and used as a narcissistic extension. The golden child\'s identity becomes organized around performance and meeting the narcissist\'s needs. Their worth feels contingent on continued excellence and approval.',e:'An adult who was the golden child may be highly competent externally while feeling chronically anxious, unable to tolerate failure, uncertain about their own desires, and confused about why they feel empty despite achieving everything that was supposed to matter.',c:'Separating worth from performance. Learning to exist and be loved outside of achievement contexts. Therapy focused on unconditional self-regard. Often involves grieving a childhood organized around someone else\'s needs.'},
    {t:'Parentification effects',d:'Long-term consequences of having been placed in an emotional caretaking role for a parent during childhood. The parentified child learns their job is to manage the parent\'s emotional state and carries this into adult relationships as a default orientation.',e:'An adult who was parentified may automatically take responsibility for others\' emotional states, feel anxious when someone around them is unhappy, have difficulty being cared for without immediately reciprocating, and feel pervasive guilt about having their own needs.',c:'Learning to locate responsibility accurately -- whose feelings are mine to manage and whose are not? Practicing receiving care without immediately deflecting. Therapy focused on the distinction between empathy and responsibility.'},
    {t:'Codependency',d:'A relational pattern where one person\'s sense of self, stability, and worth becomes organized around managing another person\'s emotions, needs, or behavior. The codependent person loses track of their own needs and identity in service of regulating the other person.',e:'A person in a codependent relationship may spend most of their mental energy anticipating the other person\'s moods, adjusting their behavior to prevent conflict, and feeling responsible for outcomes not in their control -- while having difficulty identifying what they themselves feel or need.',c:'Shifting focus from the other person\'s state to one\'s own. Regular self-check-ins -- what am I feeling right now, independent of what they are feeling? Codependents Anonymous and therapy focused on self-differentiation are both useful pathways.'},
    {t:'Anxious attachment',d:'An attachment style characterized by fear of abandonment, hypervigilance to relational signals, a tendency to seek reassurance, and difficulty tolerating distance or uncertainty. Can be an original attachment style or can intensify through narcissistic relational experiences.',e:'A person with anxious attachment may constantly monitor their partner\'s mood for signs of withdrawal, need frequent reassurance, interpret normal distance as impending abandonment, and feel a persistent low-grade anxiety that the relationship is about to end.',c:'Identifying the pattern without shame -- it developed for a reason. Learning to self-soothe rather than seeking external reassurance as the primary regulation strategy. Therapy focused on building internal security.'},
    {t:'Betrayal trauma',d:'Trauma that occurs specifically when someone depended upon for safety, care, or protection causes harm. The betrayal by a trusted person creates a specific wound that affects the ability to trust, feel safe in relationships, and integrate the contradiction between who the person was supposed to be and what they did.',e:'A person whose narcissistic parent consistently violated their trust may develop a deep difficulty trusting even safe relationships, because the template for trusted people includes betrayal.',c:'Distinguishing between the person who caused harm and people who are currently safe. The body needs evidence over time, not just intellectual understanding. Safe, consistent relationships and therapy focused on processing the original betrayal are both necessary.'},
    {t:'Hyperindependence',d:'An extreme self-reliance developed as a protective adaptation to having needs consistently unmet, punished, or exploited. The person learns that depending on others is dangerous and becomes rigidly self-sufficient. Difficulty asking for help, receiving care, or showing vulnerability.',e:'A person raised by a narcissistic parent may become highly capable as an adult but find it nearly impossible to ask for help, accept support, or show vulnerability -- because the early experience of needing something and not having it met was too costly.',c:'Small, deliberate acts of allowing help. Choosing one safe person and practicing one act of vulnerability. Noticing the internal resistance -- the belief that needing anything makes you a burden -- and working with that belief directly in therapy.'},
    {t:'Gaslighting effects',d:'The long-term perceptual and cognitive impacts of sustained gaslighting. Chronic self-doubt about one\'s own perceptions, memories, and interpretations develops as a direct result of someone repeatedly reframing reality.',e:'A person who was consistently gaslit may preface accurate observations with "maybe I\'m wrong but..." They may second-guess themselves so habitually that they cannot identify their own certainty, and may feel disoriented when someone simply validates what they observed.',c:'Rebuilding trust in one\'s own perception through consistent self-validation. Keeping a record of observations so the pattern becomes visible over time. Therapy focused on reality testing and learning to distinguish between genuine uncertainty and conditioned self-doubt.'},
    {t:'Minimization habit',d:'A learned tendency to downplay one\'s own experience, needs, or pain -- developed as an adaptation to an environment where expressing needs was punished, ignored, or met with contempt.',e:'"It wasn\'t that bad." "I\'m probably overreacting." "Other people have it worse." Said automatically, reflexively, before anyone has even questioned whether the experience was valid.',c:'Catching the minimization in real time. Before saying "it wasn\'t that bad," pausing to ask -- was it actually not that bad, or am I saying that because it feels safer? Practicing stating experiences without qualification.'},
    {t:'Over-explanation habit',d:'The tendency to justify, explain, and defend normal choices and feelings -- developed in environments where everything required explanation to avoid punishment. The person carries the habit of justification into relationships where no one asked for a reason.',e:'Someone asked what they want for dinner responds with a three-sentence justification anticipating a challenge that was never coming.',c:'Practicing plain statements without justification. "No thank you" is a complete sentence. Noticing when the explanation reflex activates and asking -- did anyone ask me to justify this?'},
    {t:'Apologizing reflex',d:'Automatic apologizing for existing, taking up space, having needs, or being perceived as an inconvenience. Developed in environments where the person\'s presence and needs were treated as burdens.',e:'Apologizing when someone bumps into you. Apologizing before making a request. Apologizing for having an opinion.',c:'Replacing automatic apologies with neutral acknowledgments. "Excuse me" instead of "I\'m so sorry." Noticing when an apology is genuinely warranted versus when it is a reflex to preemptively manage someone else\'s potential displeasure.'},
    {t:'Reality testing impairment',d:'Difficulty knowing what is real, what is a reasonable response, and what is distortion -- developed through sustained exposure to a person who consistently reframed reality.',e:'Something genuinely upsetting happens. The person\'s first response is not to feel upset but to audit whether they are allowed to feel upset -- checking their reaction against an imagined external standard before permitting themselves to have it.',c:'Learning to feel first and audit second. Allowing the initial response to exist before evaluating it. Therapy focused on validating and trusting one\'s own emotional responses as data rather than problems to be assessed for accuracy.'},
    {t:'Cognitive dissonance',d:'The persistent internal conflict between what one observes and what the narcissist\'s narrative insists should be observed. Living in sustained cognitive dissonance produces confusion, exhaustion, and a fragmented sense of reality.',e:'Watching someone behave in a way that is clearly controlling while being told -- and half-believing -- that it is actually love and care.',c:'Naming the dissonance explicitly. Writing down both versions so they can be examined. Over time, consistently trusting observation over narrative reduces the dissonance because the observation track record becomes undeniable.'},
    {t:'People-pleasing compulsion',d:'Chronic, automatic accommodation of others\' needs and preferences at the expense of one\'s own. Developed as a survival strategy where one\'s safety or approval depended on keeping others regulated. The person may not experience it as a choice -- accommodation feels instinctive.',e:'Automatically agreeing with what others want before checking what you want. Feeling responsible for everyone\'s comfort in a room. Saying yes and feeling resentment later because the yes was not genuine.',c:'Introducing a pause between the accommodation impulse and the response. "Let me think about that." builds time to check in before the automatic yes. Gradually building tolerance for disappointing people and surviving the discomfort of their reaction.'},
    {t:'Somatic symptoms',d:'Physical manifestations of chronic relational stress and unprocessed trauma. The body absorbs what the mind adapts to. Common presentations include chronic tension, fatigue, digestive issues, headaches, immune dysregulation, and difficulty sleeping.',e:'Someone in a long-term narcissistic relationship may experience persistent physical symptoms with no clear medical cause -- chronic stomach problems, tension headaches, jaw clenching, or a persistent sense of physical heaviness.',c:'Somatic therapy, body-based practices, and trauma-informed approaches that work directly with the body rather than only the mind. Recognizing that physical symptoms may be the body\'s way of expressing what was not allowed to be expressed relationally.'},
    {t:'Emotional blunting',d:'A reduction in the range or intensity of emotional experience developed as a protective adaptation to chronic emotional overwhelm, invalidation, or punishment. The person may feel numb, disconnected from their own emotional states, or unable to identify what they feel.',e:'Something significant happens and the person feels very little. Or they know intellectually they should feel something but cannot access the feeling.',c:'Gradual, safe exposure to emotional experience in therapeutic contexts. Somatic work to reconnect body sensation with feeling. Allowing small emotions to be felt fully without immediately managing or suppressing them.'},
    {t:'Identified patient',d:'In family systems theory, the person in the family who presents with symptoms -- anxiety, depression, behavioral problems -- that are actually expressions of the family system\'s dysfunction rather than individual pathology. The family unconsciously assigns this role to one person to keep the real dysfunction hidden.',e:'The child who acts out, the teenager who develops anxiety -- while the narcissistic parent is never identified as the source of the dysfunction. The identified patient carries the symptom so the family does not have to examine the system.',c:'Relocating the problem from the individual to the system. For the identified patient individually -- understanding that the symptoms they carry belong to the system, not to a deficiency in them. This reframe is often the beginning of significant relief.'},
    {t:'Flying monkeys',d:'People who, wittingly or not, act on behalf of the narcissist -- carrying messages, validating the narcissist\'s narrative, applying pressure to targets, or reporting back. May be conscious agents or genuinely conditioned believers in the narcissist\'s version of events.',e:'A family member who calls to relay the narcissist\'s grievances. A mutual friend who repeats the narcissist\'s framing of a conflict. A sibling who pressures the target to apologize.',c:'Recognizing flying monkey behavior without necessarily assigning malicious intent. Not engaging with proxy communication -- "that\'s between me and them" redirects the message back to its source. Information shared with flying monkeys should be treated as information shared with the narcissist directly.'},
    {t:'Enablers',d:'People in the narcissist\'s orbit who facilitate the behavior through compliance, minimization, defense, or active participation. Often deeply conditioned themselves and may genuinely believe they are keeping the peace.',e:'A partner who minimizes the narcissist\'s behavior. A family member who consistently explains away harmful patterns. Someone who absorbs the narcissist\'s emotional labor and thereby frees them to continue without consequence.',c:'For those impacted by enablers -- not relying on them for validation, understanding their minimization is a product of their own conditioning, and not over-investing in changing their perspective.'},
    {t:'Narcissistic family system',d:'A family organized around the needs, perceptions, and emotional regulation of a narcissistic central figure. All roles, relationships, and communication patterns in the family are defined in relation to that person. Children typically take on defined roles -- golden child, scapegoat, lost child, or mascot.',e:'A family where all conversations eventually center on one parent. Where that parent\'s mood sets the tone for every gathering. Where family members have learned their roles and perform them automatically.',c:'Differentiation -- developing an identity and relational style that exists outside of the assigned role. This is slow work and often destabilizes the system before it stabilizes the individual. Therapy and distance from the system are often both necessary.'},
    {t:'Triangulation effects',d:'Long-term relational impacts of having been consistently triangulated in family communication. The person develops hyperawareness of relational dynamics, difficulty with direct communication, and anxiety about being caught between people.',e:'An adult who was consistently triangulated as a child may find themselves automatically mediating between people, reluctant to speak directly about conflict, and anxious when two people they care about are in tension.',c:'Practicing direct communication -- speaking to the person the message is for rather than through intermediaries. Recognizing that being direct is not the same as being disloyal.'},
    {t:'Enmeshment legacy',d:'The long-term difficulty with individuation, boundaries, and emotional separateness that develops from growing up in an enmeshed family system. Adults from enmeshed families may struggle to know where they end and others begin.',e:'An adult from an enmeshed family may feel responsible for their parent\'s emotional state even when living independently, feel guilty for making autonomous choices, and experience differentiation as a form of betrayal.',c:'Individuation work -- developing a relationship with one\'s own thoughts, feelings, and preferences that exists independently of the family\'s. Learning to tolerate the guilt that comes with differentiation without treating it as a signal that something is wrong.'},
    {t:'Narcissistic abuse syndrome',d:'An informal but clinically recognized constellation of symptoms that develops specifically from sustained narcissistic abuse. Includes hypervigilance, chronic self-doubt, emotional dysregulation, trauma bonding, identity confusion, people-pleasing compulsion, and difficulty trusting one\'s own perceptions.',e:'A person who has been in a long-term relationship with a narcissist may doubt themselves constantly, be exhausted from monitoring others, feel responsible for things outside their control, struggle to trust warmth when offered, and not identify what happened as abuse because it was so gradual and normalized.',c:'Naming it is the first and often most significant step. Understanding that the cluster of symptoms has a coherent cause rather than representing personal deficiency. Trauma-informed therapy, connection with others who have similar experiences, and gradual rebuilding of self-trust over time.'}
  ];
  var h='<div class="def-disc"><div class="def-disc-title">Psychological terms glossary</div><div class="def-disc-body">These terms describe patterns that can develop in people who have been in long-term relationships with narcissists -- as children, partners, or close contacts. Understanding these terms is not self-diagnosis. It is a framework for making sense of responses that developed for good reasons in difficult conditions.</div></div>';
  var categories=[
    {label:'Trauma responses',ids:[0,1,2,3,4]},
    {label:'Identity and self impacts',ids:[5,6,7,8,9]},
    {label:'Relational impacts',ids:[10,11,12,13]},
    {label:'Cognitive and perceptual impacts',ids:[14,15,16,17,18,19]},
    {label:'Behavioral and somatic impacts',ids:[20,21,22]},

      h+='<div class="dcb" id="'+tid+'">';
      h+='<div class="dsl">Definition</div><div class="dtx">'+term.d+'</div>';

      h+='</div></div>';
    });
  });
  var glp=document.getElementById('glp');if(glp)glp.innerHTML=h;
}
